<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>1C no-image reconstruction</title>
  <style>
    html, body {
      margin: 0;
      background: #efefef;
      font-family: Arial, Helvetica, sans-serif;
      color: #111;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #ccc;
    }

    h1 { margin: 0; font-size: 18px; }

    .toggle {
      display: inline-flex;
      overflow: hidden;
      border: 1px solid #aaa;
      border-radius: 4px;
    }

    .toggle button {
      border: 0;
      padding: 5px 10px;
      background: #fff;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    .toggle button.active { background: #111; color: #fff; }

    main {
      min-height: calc(100vh - 50px);
      display: grid;
      place-items: center;
      padding: 18px;
      box-sizing: border-box;
    }

    .frame {
      background: #fff;
      border: 1px solid #d0d0d0;
      box-shadow: 0 1px 5px rgba(0,0,0,.08);
      width: 560px;
      height: 512px;
      position: relative;
    }

    .surface {
      position: absolute;
      inset: 0;
      background: #fff;
      overflow: hidden;
    }

    .reference {
      display: none;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .show-reference .surface { display: none; }
    .show-reference .reference { display: block; }

    .text {
      position: absolute;
      white-space: pre;
      line-height: 1.08;
      color: #111;
    }

    canvas { position: absolute; }

    .hline {
      position: absolute;
      height: 0;
      border-top: 1.4px solid #111;
    }

    .vline {
      position: absolute;
      width: 0;
      border-left: 1.4px solid #111;
    }

    .dash-v {
      position: absolute;
      width: 0;
      border-left: 1.2px dashed #009da3;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>reference-01-place-code-opto-C</h1>
      <div style="font-size:12px;color:#555">Generated candidate uses no source image. Reference is QA-only.</div>
    </div>
    <div class="toggle">
      <button id="showGenerated" class="active">Generated</button>
      <button id="showReference">Reference</button>
    </div>
  </header>

  <main>
    <div id="frame" class="frame">
      <div id="surface" class="surface"></div>
      <img id="reference" class="reference" alt="Reference panel">
    </div>
  </main>

  <script>
    const DATA_URL = './reference-01-place-code-opto-C.json';
    const TEAL = '#009da3';

    function rng(seed) {
      return function random() {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function normal(random) {
      let u = 0;
      let v = 0;
      while (u === 0) u = random();
      while (v === 0) v = random();
      return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function add(parent, tag, attrs = {}, text = '') {
      const node = document.createElement(tag);
      for (const [key, value] of Object.entries(attrs)) {
        if (key === 'style') Object.assign(node.style, value);
        else if (key.startsWith('data-')) node.setAttribute(key, value);
        else node[key] = value;
      }
      node.textContent = text;
      parent.appendChild(node);
      return node;
    }

    function px(value) {
      return `${Number(value).toFixed(2)}px`;
    }

    function text(root, spec) {
      return add(root, 'div', {
        className: 'text',
        style: {
          left: px(spec.x),
          top: px(spec.y),
          width: spec.width ? px(spec.width) : 'auto',
          fontSize: px(spec.font_size),
          fontWeight: String(spec.font_weight || 400),
          color: spec.color || '#111',
          textAlign: spec.align || 'left',
          lineHeight: spec.line_height || '1.08'
        }
      }, spec.text);
    }

    function centeredText(root, spec) {
      return text(root, {
        ...spec,
        x: spec.center_x - spec.width / 2,
        align: 'center'
      });
    }

    function rotatedCenteredText(root, spec) {
      return add(root, 'div', {
        className: 'text',
        style: {
          left: px(spec.center_x),
          top: px(spec.center_y),
          width: px(spec.width),
          fontSize: px(spec.font_size),
          textAlign: 'center',
          transform: 'translate(-50%, -50%) rotate(-90deg)',
          transformOrigin: 'center center',
          lineHeight: '1.05'
        }
      }, spec.text);
    }

    function hline(root, x, y, width, color = '#111', stroke = 1.4) {
      return add(root, 'div', {
        className: 'hline',
        style: {
          left: px(x),
          top: px(y),
          width: px(width),
          borderTopColor: color,
          borderTopWidth: px(stroke)
        }
      });
    }

    function vline(root, x, y, height, color = '#111', stroke = 1.4, dashed = false) {
      return add(root, 'div', {
        className: dashed ? 'dash-v' : 'vline',
        style: {
          left: px(x),
          top: px(y),
          height: px(height),
          borderLeftColor: color,
          borderLeftWidth: px(stroke)
        }
      });
    }

    function yScale(plot, domain, value) {
      return plot.y + (domain[1] - value) / (domain[1] - domain[0]) * plot.height;
    }

    function drawRaster(root, box, color, depressed) {
      const canvas = add(root, 'canvas', {
        style: {
          left: px(box.x),
          top: px(box.y),
          width: px(box.width),
          height: px(box.height)
        }
      });
      canvas.width = box.width;
      canvas.height = box.height;
      const ctx = canvas.getContext('2d');
      const random = rng(box.seed);
      ctx.fillStyle = color;
      const rows = 62;
      for (let row = 0; row < rows; row += 1) {
        const y = row / rows * box.height + random() * 1.2;
        const baselineCount = depressed ? 23 : 26;
        for (let i = 0; i < baselineCount; i += 1) {
          const x = random() * box.width;
          const postEvent = x > 156;
          if (depressed && postEvent && random() < 0.66) continue;
          if (!depressed && postEvent && random() < 0.10) continue;
          ctx.fillRect(x, y, 1.45, 1.45);
        }
      }
    }

    function drawLinePlot(root, cfg) {
      const box = cfg.line_panel.plot;
      const canvas = add(root, 'canvas', {
        style: {
          left: px(box.x),
          top: px(box.y),
          width: px(box.width),
          height: px(box.height)
        }
      });
      canvas.width = box.width;
      canvas.height = box.height;
      const ctx = canvas.getContext('2d');

      function xScale(t) {
        // Match the explicit tick geometry in the source panel.
        const ticks = cfg.line_panel.x_ticks;
        for (let i = 0; i < ticks.length - 1; i += 1) {
          const a = Number(ticks[i].value);
          const b = Number(ticks[i + 1].value);
          if (t >= a && t <= b) {
            const u = (t - a) / (b - a);
            return ticks[i].x + u * (ticks[i + 1].x - ticks[i].x) - box.x;
          }
        }
        return t < -1 ? 0 : box.width;
      }

      function yPlot(value) {
        return (cfg.line_panel.domain_y[1] - value) / (cfg.line_panel.domain_y[1] - cfg.line_panel.domain_y[0]) * box.height;
      }

      function curve(t, opto) {
        if (opto) {
          return 14.2 - 12.0 / (1 + Math.exp(-(t - 0.02) * 18)) + 9.0 / (1 + Math.exp(-(t - 0.9) * 4.2));
        }
        return 17.5 - 8.7 / (1 + Math.exp(-(t - 0.12) * 12)) + 7.0 / (1 + Math.exp(-(t - 0.72) * 4.4));
      }

      function drawBand(color, opto) {
        ctx.beginPath();
        for (let i = 0; i <= 120; i += 1) {
          const t = -1 + i / 120 * 3;
          const value = curve(t, opto) + 1.5 + Math.sin(i * 0.35) * 0.2;
          const x = xScale(t);
          const y = yPlot(value);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        for (let i = 120; i >= 0; i -= 1) {
          const t = -1 + i / 120 * 3;
          const value = curve(t, opto) - 1.5 + Math.sin(i * 0.35) * 0.2;
          ctx.lineTo(xScale(t), yPlot(value));
        }
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
      }

      function drawCurve(color, opto) {
        ctx.beginPath();
        for (let i = 0; i <= 120; i += 1) {
          const t = -1 + i / 120 * 3;
          const value = curve(t, opto) + Math.sin(i * 0.75) * 0.25;
          const x = xScale(t);
          const y = yPlot(value);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.stroke();
      }

      drawBand('rgba(0,0,0,0.18)', false);
      drawBand('rgba(0,157,163,0.18)', true);
      drawCurve('#111111', false);
      drawCurve(TEAL, true);
    }

    function render(cfg) {
      const root = document.getElementById('surface');
      document.getElementById('reference').src = cfg.source_reference;

      text(root, cfg.panel.label);
      text(root, cfg.panel.title);
      centeredText(root, cfg.event.label);

      cfg.raster_panel.side_labels.forEach(item => centeredText(root, item));
      drawRaster(root, cfg.raster_panel.control, '#111111', false);
      drawRaster(root, cfg.raster_panel.opto, TEAL, true);

      vline(root, cfg.event.x, 68, 205, TEAL, 1.4, true);
      hline(root, cfg.raster_panel.axis.x1, cfg.raster_panel.axis.y, cfg.raster_panel.axis.x2 - cfg.raster_panel.axis.x1);
      cfg.raster_panel.tick_labels.forEach(tick => {
        vline(root, tick.x, cfg.raster_panel.axis.y, 7);
        text(root, {text: tick.value, x: tick.x - (tick.value === '0' ? 4 : 14), y: 270, font_size: 16});
      });
      centeredText(root, cfg.raster_panel.x_label);

      drawLinePlot(root, cfg);
      vline(root, cfg.event.x, 306, 116, TEAL, 1.4, true);
      hline(root, cfg.line_panel.axis.x1, cfg.line_panel.axis.y, cfg.line_panel.axis.x2 - cfg.line_panel.axis.x1);
      vline(root, cfg.line_panel.axis.y_axis_x, cfg.line_panel.axis.y_axis_y1, cfg.line_panel.axis.y_axis_y2 - cfg.line_panel.axis.y_axis_y1);

      cfg.line_panel.y_ticks.forEach(tick => {
        const y = yScale(cfg.line_panel.plot, cfg.line_panel.domain_y, tick.value);
        hline(root, cfg.line_panel.axis.y_axis_x - 5, y, 5);
        text(root, {text: tick.label, x: 56, y: y - 8, font_size: 16});
      });

      cfg.line_panel.x_ticks.forEach(tick => {
        vline(root, tick.x, cfg.line_panel.axis.y, 7);
        text(root, {text: tick.value, x: tick.x - (tick.value === '0' ? 4 : 14), y: 428, font_size: 16});
      });

      rotatedCenteredText(root, cfg.line_panel.y_label);
      hline(root, cfg.line_panel.light_bar.x, cfg.line_panel.light_bar.y, cfg.line_panel.light_bar.width, TEAL, 8);
      centeredText(root, {...cfg.line_panel.light_bar.label, color: TEAL});
      centeredText(root, cfg.line_panel.x_label);

      hline(root, cfg.line_panel.legend.control.line_x, cfg.line_panel.legend.control.line_y, 28, '#111111', 3);
      text(root, {text: cfg.line_panel.legend.control.text, x: cfg.line_panel.legend.control.text_x, y: cfg.line_panel.legend.control.text_y, font_size: 12});
      hline(root, cfg.line_panel.legend.opto.line_x, cfg.line_panel.legend.opto.line_y, 28, TEAL, 3);
      text(root, {text: cfg.line_panel.legend.opto.text, x: cfg.line_panel.legend.opto.text_x, y: cfg.line_panel.legend.opto.text_y, font_size: 12});
    }

    fetch(DATA_URL).then(response => response.json()).then(render);

    const frame = document.getElementById('frame');
    const generatedButton = document.getElementById('showGenerated');
    const referenceButton = document.getElementById('showReference');
    generatedButton.onclick = () => {
      frame.classList.remove('show-reference');
      generatedButton.classList.add('active');
      referenceButton.classList.remove('active');
    };
    referenceButton.onclick = () => {
      frame.classList.add('show-reference');
      referenceButton.classList.add('active');
      generatedButton.classList.remove('active');
    };
  </script>
</body>
</html>
