<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>reference-05-grid-remapping-D reconstruction</title>
  <style>
    html, body {
      margin: 0;
      background: #eeeeee;
      color: #111111;
      font-family: Arial, Helvetica, sans-serif;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 14px;
      background: #ffffff;
      border-bottom: 1px solid #cfcfcf;
    }
    h1 { margin: 0; font-size: 16px; font-weight: 700; }
    .note { margin-top: 3px; font-size: 12px; color: #555555; }
    .toggle { display: inline-flex; border: 1px solid #aaaaaa; border-radius: 4px; overflow: hidden; }
    .toggle button { border: 0; padding: 5px 10px; background: #ffffff; color: #111111; font: inherit; font-size: 12px; cursor: pointer; }
    .toggle button.active { background: #111111; color: #ffffff; }
    main { min-height: calc(100vh - 48px); display: grid; place-items: center; padding: 16px; box-sizing: border-box; }
    .frame { position: relative; background: #ffffff; border: 1px solid #d0d0d0; box-shadow: 0 1px 5px rgba(0,0,0,0.08); overflow: hidden; }
    .surface, .reference { position: absolute; inset: 0; }
    .reference { display: none; width: 100%; height: 100%; object-fit: contain; background: #ffffff; }
    .show-reference .surface { display: none; }
    .show-reference .reference { display: block; }
    svg, canvas { position: absolute; inset: 0; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 id="title">reference-05-grid-remapping-D</h1>
      <div class="note">Generated candidate is rendered from JSON. Source image is QA-only.</div>
    </div>
    <div class="toggle" aria-label="View mode">
      <button id="generatedButton" class="active" type="button">Generated</button>
      <button id="referenceButton" type="button">Reference</button>
    </div>
  </header>
  <main>
    <div id="frame" class="frame">
      <div id="surface" class="surface"></div>
      <img id="reference" class="reference" alt="QA reference source image">
    </div>
  </main>
  <script>
    const SVG_NS = "http://www.w3.org/2000/svg";
    const JSON_PATH = "reference-05-grid-remapping-D.json";

    function $(id) { return document.getElementById(id); }
    function make(tag, attrs = {}) {
      const node = document.createElementNS(SVG_NS, tag);
      for (const [key, value] of Object.entries(attrs)) {
        if (value !== undefined && value !== null) node.setAttribute(key, value);
      }
      return node;
    }
    function mulberry32(seed) {
      return function random() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }
    function normal(rand) {
      const u = Math.max(rand(), 1e-9);
      const v = Math.max(rand(), 1e-9);
      return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
    }
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function yScale(plot, value) {
      const box = plot.dataBbox;
      const [min, max] = plot.y.domain;
      return box.y + box.height - ((value - min) / (max - min)) * box.height;
    }
    function distFor(panel, id) {
      return panel.data.distributions.find((dist) => dist.id === id);
    }
    function catFor(panel, id) {
      return panel.plot.x.categories.find((cat) => cat.id === id);
    }
    function generateValues(dist) {
      const rand = mulberry32(dist.seed);
      const cumulative = [];
      let acc = 0;
      for (const comp of dist.components) {
        acc += comp.weight;
        cumulative.push({limit: acc, comp});
      }
      const values = [];
      for (let i = 0; i < dist.count; i++) {
        const pick = rand();
        const chosen = cumulative.find((entry) => pick <= entry.limit).comp;
        values.push(clamp(chosen.mean + chosen.sd * normal(rand), dist.clip[0], dist.clip[1]));
      }
      return values;
    }
    function densityAt(dist, y) {
      return dist.components.reduce((sum, comp) => {
        const z = (y - comp.mean) / comp.sd;
        return sum + comp.weight * Math.exp(-0.5 * z * z) / comp.sd;
      }, 0);
    }
    function violinPath(panel, plot, dist) {
      const category = catFor(panel, dist.category);
      const ys = [];
      for (let y = plot.y.domain[0]; y <= plot.y.domain[1] + 1e-6; y += dist.violin.sampleStep) ys.push(y);
      const maxDensity = Math.max(...ys.map((y) => densityAt(dist, y)));
      const right = ys.map((y) => [category.x + densityAt(dist, y) / maxDensity * dist.violin.maxHalfWidth, yScale(plot, y)]);
      const left = ys.slice().reverse().map((y) => [category.x - densityAt(dist, y) / maxDensity * dist.violin.maxHalfWidth, yScale(plot, y)]);
      return right.concat(left).map((pt, i) => `${i ? "L" : "M"} ${pt[0].toFixed(2)} ${pt[1].toFixed(2)}`).join(" ") + " Z";
    }
    function addText(svg, obj) {
      const node = make("text", {
        x: obj.x,
        y: obj.y,
        fill: obj.fill || "#111111",
        "font-size": obj.fontSize,
        "font-weight": obj.fontWeight || 400,
        "font-style": obj.fontStyle || "normal",
        "text-anchor": obj.anchor || "start",
        "dominant-baseline": obj.baseline || "alphabetic",
        transform: obj.rotation ? `rotate(${obj.rotation} ${obj.x} ${obj.y})` : null,
        "data-text-id": obj.id
      });
      node.textContent = obj.text;
      svg.appendChild(node);
      return node;
    }
    function render(spec) {
      $("title").textContent = spec.id;
      const frame = $("frame");
      frame.style.width = `${spec.canvas.width}px`;
      frame.style.height = `${spec.canvas.height}px`;
      $("reference").src = spec.source.path;

      const surface = $("surface");
      surface.innerHTML = "";
      const canvas = document.createElement("canvas");
      canvas.width = spec.canvas.width;
      canvas.height = spec.canvas.height;
      surface.appendChild(canvas);
      const ctx = canvas.getContext("2d");
      const svg = make("svg", {width: spec.canvas.width, height: spec.canvas.height, viewBox: `0 0 ${spec.canvas.width} ${spec.canvas.height}`});
      svg.style.fontFamily = spec.typography.fontFamily;
      surface.appendChild(svg);

      const panel = spec.panels[0];
      const plot = panel.plot;
      addText(svg, panel.label);
      addText(svg, panel.title);

      svg.appendChild(make("line", {x1: plot.axisBbox.x, y1: plot.axisBbox.y, x2: plot.axisBbox.x, y2: plot.axisBbox.y + plot.axisBbox.height, stroke: "#111111", "stroke-width": 1.4, "data-axis": "y"}));
      for (const tick of plot.y.ticks) {
        const y = yScale(plot, tick.value);
        svg.appendChild(make("line", {x1: plot.axisBbox.x - 6, y1: y, x2: plot.axisBbox.x, y2: y, stroke: "#111111", "stroke-width": 1.2, "data-axis": "y", "data-value": tick.value}));
        addText(svg, {id: `y-tick-${tick.label}`, text: tick.label, x: plot.axisBbox.x - 14, y: y + 5, fontSize: 18, anchor: "end"});
      }
      addText(svg, {...plot.y.label, id: "y-axis-label", fontSize: 20, anchor: "middle"});

      const zero = panel.marks.find((m) => m.id === "zero-line");
      svg.appendChild(make("line", {x1: zero.x1, y1: yScale(plot, zero.value), x2: zero.x2, y2: yScale(plot, zero.value), stroke: zero.stroke, "stroke-width": zero.strokeWidth, "stroke-dasharray": zero.dasharray, "data-mark-id": zero.id}));

      for (const mark of panel.marks.filter((m) => m.type === "violin")) {
        const dist = distFor(panel, mark.distribution);
        svg.appendChild(make("path", {d: violinPath(panel, plot, dist), fill: dist.violin.fill, "fill-opacity": dist.violin.fillOpacity, stroke: dist.violin.stroke, "stroke-width": dist.violin.strokeWidth, "data-mark-id": mark.id, "data-distribution": dist.id}));
      }

      for (const mark of panel.marks.filter((m) => m.type === "scatter")) {
        const dist = distFor(panel, mark.distribution);
        const category = catFor(panel, dist.category);
        const rand = mulberry32(dist.seed + 99);
        ctx.fillStyle = mark.fill;
        ctx.globalAlpha = mark.opacity;
        for (const value of generateValues(dist)) {
          const x = category.x + (rand() * 2 - 1) * mark.jitterHalfWidth * Math.pow(rand(), 0.55);
          const y = yScale(plot, value);
          ctx.beginPath();
          ctx.arc(x, y, mark.radius, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      const summary = panel.marks.find((m) => m.type === "summaryOverlay");
      for (const distId of summary.distributions) {
        const dist = distFor(panel, distId);
        const category = catFor(panel, dist.category);
        svg.appendChild(make("line", {x1: category.x, y1: yScale(plot, dist.iqr[0]), x2: category.x, y2: yScale(plot, dist.iqr[1]), stroke: summary.iqrLine.stroke, "stroke-width": summary.iqrLine.strokeWidth, "data-summary": dist.id}));
        svg.appendChild(make("line", {x1: category.x - summary.categoryBarHalfWidth, y1: yScale(plot, 0), x2: category.x + summary.categoryBarHalfWidth, y2: yScale(plot, 0), stroke: "#111111", "stroke-width": 1.2, "data-summary-baseline": dist.id}));
        svg.appendChild(make("circle", {cx: category.x, cy: yScale(plot, dist.median), r: summary.medianMarker.radius, fill: summary.medianMarker.fill, stroke: summary.medianMarker.stroke, "stroke-width": summary.medianMarker.strokeWidth, "data-median": dist.id}));
      }

      const bracket = panel.annotations.find((a) => a.type === "bracket");
      svg.appendChild(make("line", {x1: bracket.x1, y1: bracket.y, x2: bracket.x2, y2: bracket.y, stroke: bracket.stroke, "stroke-width": bracket.strokeWidth, "data-annotation-id": bracket.id}));
      const p = make("text", {x: bracket.label.x, y: bracket.label.y, "font-size": bracket.label.fontSize, "font-style": "italic", "text-anchor": "middle", fill: "#111111", "data-annotation-label": bracket.id});
      p.append("p = 3.1 x 10");
      const sup = make("tspan", {"baseline-shift": "super", "font-size": 10});
      sup.textContent = "-5";
      p.appendChild(sup);
      svg.appendChild(p);

      for (const ann of panel.annotations.filter((a) => a.type !== "bracket")) addText(svg, ann);
    }
    async function init() {
      const response = await fetch(JSON_PATH);
      render(await response.json());
      $("generatedButton").addEventListener("click", () => {
        $("frame").classList.remove("show-reference");
        $("generatedButton").classList.add("active");
        $("referenceButton").classList.remove("active");
      });
      $("referenceButton").addEventListener("click", () => {
        $("frame").classList.add("show-reference");
        $("referenceButton").classList.add("active");
        $("generatedButton").classList.remove("active");
      });
    }
    init();
  </script>
</body>
</html>
