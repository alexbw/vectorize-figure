<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>reference-01-place-code-opto-B reconstruction</title>
  <style>
    :root {
      color-scheme: light;
      --page-bg: #f3f4f6;
      --ink: #111;
      --muted: #555;
      --axis: #222;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: start center;
      background: var(--page-bg);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
    }
    .workspace {
      display: grid;
      grid-template-columns: max-content;
      gap: 12px;
      padding: 20px;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      color: var(--muted);
    }
    .toolbar label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      user-select: none;
    }
    .stage {
      display: grid;
      grid-template-columns: max-content;
      gap: 14px;
      align-items: start;
    }
    .stage.show-reference {
      grid-template-columns: max-content max-content;
    }
    figure {
      margin: 0;
    }
    .candidate,
    .reference {
      width: 464px;
    }
    .candidate svg {
      display: block;
      width: 464px;
      height: 512px;
      background: #fff;
      box-shadow: 0 1px 5px rgba(0, 0, 0, 0.16);
    }
    .reference {
      display: none;
    }
    .stage.show-reference .reference {
      display: block;
    }
    .reference img {
      display: block;
      width: 464px;
      height: 512px;
      object-fit: contain;
      background: #fff;
      box-shadow: 0 1px 5px rgba(0, 0, 0, 0.16);
    }
    figcaption {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }
    .axis path,
    .axis line {
      vector-effect: non-scaling-stroke;
      shape-rendering: crispEdges;
    }
    text {
      font-family: Arial, Helvetica, sans-serif;
      dominant-baseline: alphabetic;
    }
  </style>
</head>
<body>
  <main class="workspace">
    <div class="toolbar">
      <strong>Generated editable reconstruction</strong>
      <label><input id="toggle-reference" type="checkbox"> Show labeled QA/reference source</label>
    </div>
    <div id="stage" class="stage">
      <figure class="candidate">
        <svg id="figure" role="img" aria-label="Generated reconstruction of panel B"></svg>
        <figcaption>Candidate: generated from JSON with SVG text, axes, bands, traces, and lines.</figcaption>
      </figure>
      <figure class="reference">
        <img id="reference-img" alt="QA/reference source raster, not part of the generated candidate">
        <figcaption>QA/reference only: original source raster.</figcaption>
      </figure>
    </div>
  </main>
  <script>
    const fallbackSpec = null;
    const SVG_NS = "http://www.w3.org/2000/svg";

    function svgEl(name, attrs = {}, parent) {
      const node = document.createElementNS(SVG_NS, name);
      for (const [key, value] of Object.entries(attrs)) {
        if (value !== undefined && value !== null) node.setAttribute(key, value);
      }
      if (parent) parent.appendChild(node);
      return node;
    }

    function mulberry32(seed) {
      let t = seed >>> 0;
      return function next() {
        t += 0x6D2B79F5;
        let r = Math.imul(t ^ (t >>> 15), 1 | t);
        r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
        return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
      };
    }

    function makeScales(plot) {
      const cs = plot.coordinateSystem;
      const [x0, x1] = cs.x.domain;
      const [px0, px1] = cs.x.range;
      const [y0, y1] = cs.y.domain;
      const [py0, py1] = cs.y.range;
      return {
        x: value => px0 + ((value - x0) / (x1 - x0)) * (px1 - px0),
        y: value => py0 + ((value - y0) / (y1 - y0)) * (py1 - py0)
      };
    }

    function linePath(points, scales) {
      return points.map((point, index) => {
        const command = index === 0 ? "M" : "L";
        return `${command}${scales.x(point[0]).toFixed(2)},${scales.y(point[1]).toFixed(2)}`;
      }).join(" ");
    }

    function bandPath(series, scales) {
      const upper = series.mean.map((point, index) => [point[0], point[1] + series.uncertainty[index][1]]);
      const lower = series.mean.map((point, index) => [point[0], Math.max(0, point[1] - series.uncertainty[index][1])]).reverse();
      return `${linePath(upper, scales)} ${lower.map(point => `L${scales.x(point[0]).toFixed(2)},${scales.y(point[1]).toFixed(2)}`).join(" ")} Z`;
    }

    function generatedTrace(series, index) {
      const recipe = series.traceRecipe;
      const rand = mulberry32(recipe.seed + index * 97);
      const scale = recipe.peakScale[0] + rand() * (recipe.peakScale[1] - recipe.peakScale[0]);
      const shift = recipe.peakShift[0] + rand() * (recipe.peakShift[1] - recipe.peakShift[0]);
      const width = 0.78 + rand() * 0.52;
      return series.mean.map(point => {
        const x = point[0];
        const centerWeight = Math.exp(-Math.pow((x - 96 - shift) / 48, 2));
        const edgeWeight = 0.42 + 0.58 * centerWeight;
        const wobble = (rand() - 0.5) * recipe.jitter + Math.sin((x + index * 11) / 17) * recipe.jitter * 0.32;
        const y = Math.max(0.35, point[1] * (1 + (scale - 1) * edgeWeight * width) + wobble);
        return [x, y];
      });
    }

    function drawText(parent, text, attrs = {}) {
      const node = svgEl("text", attrs, parent);
      node.textContent = text;
      return node;
    }

    function render(spec) {
      const svg = document.getElementById("figure");
      svg.replaceChildren();
      svg.setAttribute("viewBox", `0 0 ${spec.canvas.width} ${spec.canvas.height}`);
      svg.setAttribute("width", spec.canvas.width);
      svg.setAttribute("height", spec.canvas.height);
      svgEl("rect", {x: 0, y: 0, width: spec.canvas.width, height: spec.canvas.height, fill: spec.canvas.background}, svg);

      const panel = spec.panels[0];
      const plot = panel.plot;
      const scales = makeScales(plot);
      const seriesById = Object.fromEntries(panel.data.series.map(series => [series.id, series]));

      drawText(svg, panel.label.text, {
        id: panel.label.id,
        x: panel.label.x,
        y: panel.label.y + panel.label.fontSize,
        "font-size": panel.label.fontSize,
        "font-weight": panel.label.fontWeight,
        fill: spec.typography.color
      });
      drawText(svg, panel.title.text, {
        id: panel.title.id,
        x: panel.title.x,
        y: panel.title.y + panel.title.fontSize - 1,
        "font-size": panel.title.fontSize,
        "font-weight": panel.title.fontWeight,
        fill: spec.typography.color
      });

      const traceLayer = svgEl("g", {id: "trace-layer"}, svg);
      const bandLayer = svgEl("g", {id: "band-layer"}, svg);
      const meanLayer = svgEl("g", {id: "mean-layer"}, svg);
      const axisLayer = svgEl("g", {id: "axis-layer", class: "axis"}, svg);
      const textLayer = svgEl("g", {id: "text-layer"}, svg);

      for (const mark of panel.marks.filter(item => item.type === "lineSeriesReplicates")) {
        const series = seriesById[mark.series];
        for (let i = 0; i < series.traceRecipe.count; i += 1) {
          svgEl("path", {
            id: `${mark.id}-${i}`,
            d: linePath(generatedTrace(series, i), scales),
            fill: "none",
            stroke: mark.stroke,
            "stroke-width": mark.strokeWidth,
            "stroke-linecap": "round",
            "stroke-linejoin": "round",
            opacity: series.traceRecipe.opacity,
            "data-series": series.id
          }, traceLayer);
        }
      }

      for (const mark of panel.marks.filter(item => item.type === "uncertaintyBand")) {
        const series = seriesById[mark.series];
        svgEl("path", {
          id: mark.id,
          d: bandPath(series, scales),
          fill: series.bandColor,
          opacity: mark.opacity,
          "data-series": series.id
        }, bandLayer);
      }

      for (const mark of panel.marks.filter(item => item.type === "lineSeries")) {
        const series = seriesById[mark.series];
        svgEl("path", {
          id: mark.id,
          d: linePath(series.mean, scales),
          fill: "none",
          stroke: series.color,
          "stroke-width": mark.strokeWidth,
          "stroke-linecap": "round",
          "stroke-linejoin": "round",
          "data-series": series.id
        }, meanLayer);
      }

      const xAxis = plot.axes.xAxis;
      const yAxis = plot.axes.yAxis;
      svgEl("line", {id: xAxis.id, x1: xAxis.line.x1, y1: xAxis.line.y1, x2: xAxis.line.x2, y2: xAxis.line.y2, stroke: "var(--axis)", "stroke-width": 1.1}, axisLayer);
      svgEl("line", {id: yAxis.id, x1: yAxis.line.x1, y1: yAxis.line.y1, x2: yAxis.line.x2, y2: yAxis.line.y2, stroke: "var(--axis)", "stroke-width": 1.1}, axisLayer);

      for (const tick of xAxis.ticks) {
        const x = scales.x(tick.value);
        svgEl("line", {x1: x, y1: xAxis.line.y1, x2: x, y2: xAxis.line.y1 + xAxis.tickLength, stroke: "var(--axis)", "stroke-width": 1}, axisLayer);
        drawText(textLayer, tick.label, {x, y: xAxis.line.y1 + 23, "font-size": 16, "text-anchor": "middle", fill: spec.typography.color, "data-axis": "x", "data-value": tick.value});
      }
      for (const tick of yAxis.ticks) {
        const y = scales.y(tick.value);
        svgEl("line", {x1: yAxis.line.x1 - yAxis.tickLength, y1: y, x2: yAxis.line.x1, y2: y, stroke: "var(--axis)", "stroke-width": 1}, axisLayer);
        drawText(textLayer, tick.label, {x: yAxis.line.x1 - 13, y: y + 5, "font-size": 16, "text-anchor": "end", fill: spec.typography.color, "data-axis": "y", "data-value": tick.value});
      }

      drawText(textLayer, xAxis.label.text, {
        id: xAxis.label.id,
        x: xAxis.label.anchor.x,
        y: xAxis.label.anchor.y,
        "font-size": xAxis.label.fontSize,
        "text-anchor": xAxis.label.textAnchor,
        fill: spec.typography.color
      });
      drawText(textLayer, yAxis.label.text, {
        id: yAxis.label.id,
        x: yAxis.label.anchor.x,
        y: yAxis.label.anchor.y,
        "font-size": yAxis.label.fontSize,
        "text-anchor": yAxis.label.textAnchor,
        transform: `rotate(${yAxis.label.rotation} ${yAxis.label.anchor.x} ${yAxis.label.anchor.y})`,
        fill: spec.typography.color
      });

      const legend = panel.legend;
      for (const item of legend.items) {
        const series = seriesById[item.series];
        svgEl("line", {
          x1: item.line.x1,
          y1: item.line.y1,
          x2: item.line.x2,
          y2: item.line.y2,
          stroke: series.color,
          "stroke-width": legend.strokeWidth,
          "stroke-linecap": "round",
          "data-series": series.id
        }, textLayer);
        drawText(textLayer, item.label, {
          x: legend.labelX,
          y: item.line.y1 + 5,
          "font-size": legend.fontSize,
          fill: spec.typography.color,
          "data-series": series.id
        });
      }

      document.getElementById("reference-img").src = spec.source.path;
    }

    async function loadSpec() {
      try {
        const response = await fetch("reference-01-place-code-opto-B.json", {cache: "no-store"});
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } catch (error) {
        if (fallbackSpec) return fallbackSpec;
        throw error;
      }
    }

    document.getElementById("toggle-reference").addEventListener("change", event => {
      document.getElementById("stage").classList.toggle("show-reference", event.target.checked);
    });

    loadSpec().then(render).catch(error => {
      const svg = document.getElementById("figure");
      svg.setAttribute("viewBox", "0 0 464 512");
      drawText(svg, `Unable to load JSON: ${error.message}`, {x: 24, y: 48, "font-size": 16, fill: "#9b1c1c"});
    });
  </script>
</body>
</html>
