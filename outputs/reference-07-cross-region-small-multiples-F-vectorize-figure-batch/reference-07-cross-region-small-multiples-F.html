<!doctype html>
<html lang="en">
<head>

  <title>reference-07-cross-region-small-multiples-F reconstruction</title>
  <style>
    html, body {
      margin: 0;
      background: #eeeeee;
      color: #111111;
      font-family: Arial, Helvetica, sans-serif;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 9px 12px;
      background: #ffffff;
      border-bottom: 1px solid #cfcfcf;
    }

    h1 {
      margin: 0;
      font-size: 14px;
      line-height: 1.2;
    }

    .note {
      margin-top: 2px;
      color: #555555;
      font-size: 11px;
    }

    .toggle {
      display: inline-flex;
      overflow: hidden;
      border: 1px solid #999999;
      border-radius: 4px;
      flex: 0 0 auto;
    }

    .toggle button {
      border: 0;
      padding: 5px 9px;
      background: #ffffff;
      color: #111111;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }

    .toggle button.active {
      background: #111111;
      color: #ffffff;
    }

    main {
      min-height: calc(100vh - 47px);
      display: grid;
      place-items: center;
      padding: 16px;
      box-sizing: border-box;
    }

    .frame {
      position: relative;
      background: #ffffff;
      border: 1px solid #d4d4d4;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .surface, .reference {
      position: absolute;
      inset: 0;
    }

    .reference {
      display: none;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #ffffff;
    }

    .show-reference .surface {
      display: none;
    }

    .show-reference .reference {
      display: block;
    }

    .qa-label {
      position: absolute;
      left: 6px;
      bottom: 5px;
      display: none;
      padding: 2px 5px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #777777;
      font-size: 10px;
      font-weight: 700;
    }

    .show-reference .qa-label {
      display: block;
    }

    svg {
      position: absolute;
      inset: 0;
      overflow: visible;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 id="title">Sparse population raster reconstruction</h1>
      <div class="note">Generated candidate is rendered from JSON. Source image is QA-only.</div>
    </div>
    <div class="toggle" aria-label="View mode">
      <button id="generatedButton" class="active" type="button">Generated</button>
      <button id="referenceButton" type="button">Reference</button>
    </div>
  </header>

  <main>
    <div id="frame" class="frame">
      <div id="surface" class="surface"></div>
      <img id="reference" class="reference" alt="QA reference source image">
      <div class="qa-label">QA reference only</div>
    </div>
  </main>

  <script id="fallback-spec" type="application/json">
{

  },
  "coordinateSystems": [{"id": "position-x", "type": "linear", "domain": [0, 50], "range": [54, 361], "unit": "cm"}],

    "bbox": {"x": 0, "y": 0, "width": 364, "height": 330},
    "plot": {"dataBbox": {"x": 54, "y": 74, "width": 307, "height": 238}, "x": {"scale": "linear", "domain": [0, 50], "ticks": [{"value": 0, "label": "0"}, {"value": 10, "label": "10"}, {"value": 20, "label": "20"}, {"value": 30, "label": "30"}, {"value": 40, "label": "40"}], "label": {"text": "Position (cm)", "x": 162, "y": 9, "fontSize": 13, "fontWeight": 400, "anchor": "middle"}}},
    "groups": [
      {"id": "ca1", "type": "rasterGroup", "label": "CA1", "count": 142, "color": "#1a47bf", "box": {"x": 54, "y": 75, "width": 307, "height": 40}, "rowCount": 10, "generationRecipe": {"type": "clusteredSparseRaster", "seed": 14201, "baselineEvents": 45, "clusters": [{"center": 2.5, "spread": 1.8, "events": 17}, {"center": 12.5, "spread": 2.2, "events": 55}, {"center": 19.0, "spread": 2.0, "events": 27}, {"center": 35.0, "spread": 2.8, "events": 70}, {"center": 46.5, "spread": 2.1, "events": 41}], "tickHeight": 5.2, "tickWidth": 0.9}},
      {"id": "ca3", "type": "rasterGroup", "label": "CA3", "count": 123, "color": "#1f5fd0", "box": {"x": 54, "y": 122, "width": 307, "height": 40}, "rowCount": 9, "generationRecipe": {"type": "clusteredSparseRaster", "seed": 12303, "baselineEvents": 24, "clusters": [{"center": 12.5, "spread": 1.9, "events": 44}, {"center": 20.2, "spread": 2.4, "events": 18}, {"center": 35.8, "spread": 3.1, "events": 30}, {"center": 43.2, "spread": 2.0, "events": 14}], "tickHeight": 4.6, "tickWidth": 0.8}},

      {"id": "pfc", "type": "rasterGroup", "label": "PFC", "count": 118, "color": "#f05a22", "box": {"x": 54, "y": 218, "width": 307, "height": 40}, "rowCount": 9, "generationRecipe": {"type": "clusteredSparseRaster", "seed": 11811, "baselineEvents": 42, "clusters": [{"center": 4.5, "spread": 2.0, "events": 24}, {"center": 18.2, "spread": 2.7, "events": 34}, {"center": 29.0, "spread": 2.5, "events": 28}, {"center": 42.5, "spread": 3.1, "events": 46}], "tickHeight": 4.4, "tickWidth": 0.8}},
      {"id": "rsc", "type": "rasterGroup", "label": "RSC", "count": 110, "color": "#ff0000", "box": {"x": 54, "y": 266, "width": 307, "height": 44}, "rowCount": 9, "generationRecipe": {"type": "clusteredSparseRaster", "seed": 11013, "baselineEvents": 30, "clusters": [{"center": 7.0, "spread": 2.0, "events": 20}, {"center": 19.5, "spread": 2.4, "events": 25}, {"center": 39.5, "spread": 3.4, "events": 28}, {"center": 46.0, "spread": 1.9, "events": 24}], "tickHeight": 4.1, "tickWidth": 0.8}}
    ],
    "marks": [{"id": "raster-strips", "type": "raster", "usesTransform": "position-x", "groups": ["ca1", "ca3", "dg", "pfc", "rsc"], "renderer": "svg", "style": {"stroke": "#111111", "strokeWidth": 0.8, "opacity": 0.82}}],
    "annotations": [],
    "provenance": [{"target": "raster events", "confidence": "medium", "note": "Generated from visually estimated density clusters; not extracted measurements."}]
  }],
  "rendering": {"renderer": "hybrid-svg", "layerOrder": ["background", "labels", "group boxes", "raster ticks", "axis ticks"]},
  "validation": {"expectedGroups": 5, "expectedXAxisTicks": 5, "sourceRasterPolicy": "Source path may only be assigned to the QA image element."},
  "confidence": [{"target": "overall first-pass reconstruction", "confidence": "medium", "note": "Approximate and editable."}]
}
  </script>

  <script>
    const SVG_NS = 'http://www.w3.org/2000/svg';
    const specFile = 'reference-07-cross-region-small-multiples-F.json';

    function $(id) {
      return document.getElementById(id);
    }

    function svgNode(tag, attrs = {}) {
      const node = document.createElementNS(SVG_NS, tag);
      for (const [key, value] of Object.entries(attrs)) {
        if (value !== undefined && value !== null) node.setAttribute(key, value);
      }
      return node;
    }

    function mulberry32(seed) {
      return function next() {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function randn(random) {
      const u = Math.max(random(), 1e-7);
      const v = Math.max(random(), 1e-7);
      return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function xScale(value, domain, range) {
      const t = (value - domain[0]) / (domain[1] - domain[0]);
      return range[0] + t * (range[1] - range[0]);
    }

    function makeRasterEvents(group, xDomain) {
      const recipe = group.generationRecipe;
      const random = mulberry32(recipe.seed);
      const events = [];
      for (let i = 0; i < recipe.baselineEvents; i += 1) {
        events.push({
          x: xDomain[0] + random() * (xDomain[1] - xDomain[0]),
          row: Math.floor(random() * group.rowCount)
        });
      }
      recipe.clusters.forEach((cluster) => {
        for (let i = 0; i < cluster.events; i += 1) {
          events.push({
            x: clamp(cluster.center + randn(random) * cluster.spread, xDomain[0], xDomain[1]),
            row: Math.floor(random() * group.rowCount)
          });
        }
      });
      return events.sort((a, b) => a.x - b.x);
    }

    function addText(svg, textSpec, defaults = {}) {
      const text = svgNode('text', {
        x: textSpec.x,
        y: textSpec.y,
        'font-family': textSpec.fontFamily || defaults.fontFamily,
        'font-size': textSpec.fontSize || defaults.fontSize,
        'font-weight': textSpec.fontWeight || 400,
        fill: textSpec.fill || defaults.color || '#111111',
        'text-anchor': textSpec.anchor || 'start',
        'dominant-baseline': textSpec.baseline || 'alphabetic',
        'letter-spacing': 0,
        'data-object-id': textSpec.id || '',
        'data-role': textSpec.role,
        'data-axis': textSpec.axis,
        'data-value': textSpec.value
      });
      text.textContent = textSpec.text;
      svg.appendChild(text);
      return text;
    }

    function render(spec) {
      document.title = `${spec.id} reconstruction`;
      $('title').textContent = spec.panels[0].title.text;

      const frame = $('frame');
      frame.style.width = `${spec.canvas.width}px`;
      frame.style.height = `${spec.canvas.height}px`;

      const reference = $('reference');
      reference.src = spec.source.path;

      const surface = $('surface');
      surface.innerHTML = '';
      const svg = svgNode('svg', {
        viewBox: `0 0 ${spec.canvas.width} ${spec.canvas.height}`,
        width: spec.canvas.width,
        height: spec.canvas.height,
        role: 'img',
        'aria-label': 'Generated sparse population raster reconstruction'
      });
      surface.appendChild(svg);
      const defs = svgNode('defs');
      svg.appendChild(defs);

      svg.appendChild(svgNode('rect', {
        x: 0,
        y: 0,
        width: spec.canvas.width,
        height: spec.canvas.height,
        fill: spec.canvas.background
      }));

      const panel = spec.panels[0];
      const font = {
        fontFamily: spec.typography.fontFamily,
        fontSize: spec.typography.defaultSize,
        color: spec.typography.color
      };

      addText(svg, panel.plot.x.label, font);
      addText(svg, panel.label, font);
      addText(svg, panel.title, font);

      const x = panel.plot.x;
      const dataBox = panel.plot.dataBbox;
      const xDomain = x.domain;
      const xRange = [dataBox.x, dataBox.x + dataBox.width];

      panel.groups.forEach((group) => {
        const box = group.box;
        const clipId = `${group.id}-owner-clip`;
        const clip = svgNode('clipPath', {id: clipId});
        clip.appendChild(svgNode('rect', {x: box.x, y: box.y, width: box.width, height: box.height}));
        defs.appendChild(clip);
        const labelX = 17;
        addText(svg, {
          text: group.label,
          x: labelX,
          y: box.y + 14,
          fontSize: 14,
          fontWeight: 400,
          fill: group.color,
          id: `${group.id}-label`
        }, font);
        addText(svg, {
          text: `(${group.count})`,
          x: labelX - 1,
          y: box.y + 32,
          fontSize: 14,
          fontWeight: 400,
          fill: '#111111',
          id: `${group.id}-count`
        }, font);

        svg.appendChild(svgNode('line', {
          x1: box.x,
          y1: box.y - 1,
          x2: box.x + box.width,
          y2: box.y - 1,
          stroke: '#111111',
          'stroke-width': 1,
          'shape-rendering': 'crispEdges',
          'data-object-id': `${group.id}-top-rule`
        }));
        svg.appendChild(svgNode('line', {
          x1: box.x,
          y1: box.y + box.height,
          x2: box.x + box.width,
          y2: box.y + box.height,
          stroke: '#111111',
          'stroke-width': 1,
          'shape-rendering': 'crispEdges',
          'data-object-id': `${group.id}-bottom-rule`
        }));
        if (panel.plot.showVerticalBorders) {
          svg.appendChild(svgNode('line', {
            x1: box.x,
            y1: box.y - 1,
            x2: box.x,
            y2: box.y + box.height,
            stroke: '#111111',
            'stroke-width': 1,
            'shape-rendering': 'crispEdges',
            'data-object-id': `${group.id}-left-rule`
          }));
          svg.appendChild(svgNode('line', {
            x1: box.x + box.width,
            y1: box.y - 1,
            x2: box.x + box.width,
            y2: box.y + box.height,
            stroke: '#111111',
            'stroke-width': 1,
            'shape-rendering': 'crispEdges',
            'data-object-id': `${group.id}-right-rule`
          }));
        }

        const events = makeRasterEvents(group, xDomain);
        const rowStep = box.height / group.rowCount;
        events.forEach((event, index) => {
          const cx = xScale(event.x, xDomain, xRange);
          const jitter = (mulberry32(group.generationRecipe.seed + index)() - 0.5) * 0.9;
          const cy = box.y + 4 + event.row * rowStep + rowStep * 0.45 + jitter;
          const halfHeight = group.generationRecipe.tickHeight / 2;
          const y1 = Math.max(box.y, cy - halfHeight);
          const y2 = Math.min(box.y + box.height, cy + halfHeight);
          svg.appendChild(svgNode('line', {
            x1: cx,
            y1,
            x2: cx,
            y2,
            stroke: '#111111',
            'stroke-width': group.generationRecipe.tickWidth,
            'stroke-opacity': 0.82,
            'shape-rendering': 'crispEdges',
            'clip-path': `url(#${clipId})`,
            'data-role': 'raster-event-tick',
            'data-object-id': `${group.id}-event-${index}`,
            'data-group-id': group.id,
            'data-position-cm': event.x.toFixed(2),
            'data-row': event.row,
            'data-owner-box': JSON.stringify(box),
            'data-clipped-to-owner': 'true'
          }));
        });
      });

      const bottomY = panel.groups[panel.groups.length - 1].box.y + panel.groups[panel.groups.length - 1].box.height;
      x.ticks.forEach((tick) => {
        const tx = xScale(tick.value, xDomain, xRange);
        svg.appendChild(svgNode('line', {
          x1: tx,
          y1: panel.plot.tickInside ? bottomY - 6 : bottomY,
          x2: tx,
          y2: bottomY,
          stroke: '#111111',
          'stroke-width': 1,
          'shape-rendering': 'crispEdges',
          'data-role': 'axis-tick-mark',
          'data-axis': 'position-x',
          'data-value': tick.value,
          'data-source-x': tx,
          'data-source-y': bottomY,
          'data-object-id': `x-tick-${tick.value}`,
          'data-owner-box': JSON.stringify(dataBox)
        }));
        addText(svg, {
          text: tick.label,
          x: tx,
          y: bottomY + 20,
          fontSize: 14,
          anchor: 'middle',
          id: `x-tick-label-${tick.value}`,
          role: 'tick-label',
          axis: 'position-x',
          value: tick.value
        }, font);
      });
    }

    async function loadSpec() {
      try {
        const response = await fetch(specFile, {cache: 'no-store'});
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      } catch (error) {
        return JSON.parse($('fallback-spec').textContent);
      }
    }

    $('generatedButton').addEventListener('click', () => {
      $('frame').classList.remove('show-reference');
      $('generatedButton').classList.add('active');
      $('referenceButton').classList.remove('active');
    });

    $('referenceButton').addEventListener('click', () => {
      $('frame').classList.add('show-reference');
      $('referenceButton').classList.add('active');
      $('generatedButton').classList.remove('active');
    });

    loadSpec().then(render);
  </script>
</body>
