<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vectorize Figure Panel Reassembly Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --rail: 56px;
      --ink: #171717;
      --muted: #666a70;
      --line: #d4d8dd;
      --active: #111111;
      --bg: #f2f4f6;
      --paper: #ffffff;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    .app {
      display: grid;
      grid-template-columns: var(--rail) minmax(0, 1fr);
      width: 100vw;
      height: 100vh;
    }
    .rail {
      border-right: 1px solid var(--line);
      background: #fafafa;
      overflow-y: auto;
      padding: 7px 6px;
    }
    .thumb {
      width: 42px;
      height: 42px;
      margin: 0 0 6px;
      padding: 0;
      display: grid;
      place-items: center;
      border: 1px solid transparent;
      background: transparent;
      color: #252525;
      font: 700 12px/1 Arial, Helvetica, sans-serif;
      cursor: pointer;
    }
    .thumb.active {
      border-color: var(--active);
      background: var(--active);
      color: #fff;
    }
    .workspace {
      min-width: 0;
      display: grid;
      grid-template-rows: 44px minmax(0, 1fr);
      height: 100vh;
    }
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .title {
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 10px;
      white-space: nowrap;
      overflow: hidden;
    }
    .title strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 14px;
    }
    .title span { color: var(--muted); font-size: 12px; }
    .controls { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
    button.mode {
      width: 92px;
      height: 28px;
      border: 1px solid var(--active);
      background: var(--active);
      color: #fff;
      font: 700 12px/1 Arial, Helvetica, sans-serif;
      cursor: pointer;
    }
    .open-link {
      display: inline-flex;
      align-items: center;
      height: 28px;
      padding: 0 10px;
      border: 1px solid var(--line);
      color: var(--ink);
      background: var(--paper);
      text-decoration: none;
      font-size: 12px;
    }
    .hint { color: var(--muted); font-size: 12px; }
    .stage-wrap {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      overflow: hidden;
    }
    .stage {
      position: relative;
      width: min(calc(100vw - var(--rail) - 36px), calc((100vh - 80px) * 1.5));
      aspect-ratio: 1536 / 1024;
      overflow: hidden;
      background: var(--paper);
      border: 1px solid #c4c8cc;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }
    .native {
      position: absolute;
      left: 0;
      top: 0;
      width: 1536px;
      height: 1024px;
      transform-origin: top left;
    }
    #surface {
      background: #fff;
    }
    .panel-frame {
      position: absolute;
      border: 0;
      overflow: hidden;
      background: #fff;
    }
    #reference {
      object-fit: contain;
      display: block;
    }
    .hidden { display: none; }
    .badge {
      position: absolute;
      right: 10px;
      top: 10px;
      height: 22px;
      padding: 0 8px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(0,0,0,.18);
      font-size: 11px;
      font-weight: 700;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="app">
    <nav id="rail" class="rail" aria-label="Full figures"></nav>
    <main class="workspace">
      <header class="bar">
        <div class="title">
          <strong id="figureId"></strong>
          <span id="figureMeta"></span>
        </div>
        <div class="controls">
          <span class="hint">j/k browse · space toggle</span>
          <button id="modeButton" class="mode" type="button"></button>
          <a id="openLink" class="open-link" href="#" target="_blank" rel="noreferrer">Open</a>
        </div>
      </header>
      <section class="stage-wrap">
        <div id="stage" class="stage">
          <div id="surface" class="native" data-role="generated-candidate"></div>
          <img id="reference" class="native hidden" alt="Full reference figure">
          <div id="badge" class="badge"></div>
        </div>
      </section>
    </main>
  </div>
  <script>
    const VIEWER_VERSION = '20260608-panel-reassembly-v1';
    const figures = [
      {
        id: 'reference-01-place-code-opto',
        title: 'Place code optogenetics',
        panels: [
          ['A', 0, 0, 512, 512],
          ['B', 512, 0, 464, 512],
          ['C', 976, 0, 560, 512],
          ['D', 0, 512, 512, 512],
          ['E', 512, 512, 464, 512],
          ['F', 976, 512, 560, 512]
        ]
      },
      {
        id: 'reference-02-decision-dynamics',
        title: 'Decision dynamics',
        panels: [
          ['A', 0, 0, 430, 514],
          ['B', 430, 0, 356, 514],
          ['C', 786, 0, 361, 514],
          ['D', 1147, 0, 389, 514],
          ['E', 0, 514, 430, 510],
          ['F', 430, 514, 356, 510],
          ['G', 786, 514, 361, 510],
          ['H', 1147, 514, 389, 510]
        ]
      },
      {
        id: 'reference-03-learning-remapping',
        title: 'Learning remapping',
        panels: [
          ['A', 0, 0, 648, 526],
          ['B', 648, 0, 386, 526],
          ['C', 1034, 0, 502, 526],
          ['D', 0, 526, 443, 498],
          ['E', 443, 526, 339, 498],
          ['F', 782, 526, 425, 498],
          ['G', 1207, 526, 329, 498]
        ]
      },
      {
        id: 'reference-04-motor-manifold',
        title: 'Motor manifold',
        panels: [
          ['A', 0, 0, 482, 365],
          ['B', 482, 0, 471, 365],
          ['C', 953, 0, 583, 365],
          ['D', 0, 365, 382, 296],
          ['E', 382, 365, 409, 296],
          ['F', 791, 365, 745, 296],
          ['G', 0, 661, 330, 363],
          ['H', 330, 661, 619, 363],
          ['I', 949, 661, 587, 363]
        ]
      },
      {
        id: 'reference-05-grid-remapping',
        title: 'Grid remapping',
        panels: [
          ['A', 0, 0, 514, 500],
          ['B', 514, 0, 456, 500],
          ['C', 970, 0, 566, 500],
          ['D', 0, 500, 486, 524],
          ['E', 486, 500, 484, 524],
          ['F', 970, 500, 566, 524]
        ]
      },
      {
        id: 'reference-06-replay-stimulation',
        title: 'Replay stimulation',
        panels: [
          ['A', 0, 0, 378, 500],
          ['B', 378, 0, 374, 500],
          ['C', 752, 0, 380, 500],
          ['D', 1132, 0, 404, 500],
          ['E', 0, 500, 378, 524],
          ['F', 378, 500, 374, 524],
          ['G', 752, 500, 380, 524],
          ['H', 1132, 500, 404, 524]
        ]
      },
      {
        id: 'reference-07-cross-region-small-multiples',
        title: 'Cross-region small multiples',
        panels: [
          ['A', 0, 0, 430, 375],
          ['B', 430, 0, 364, 375],
          ['C', 794, 0, 344, 375],
          ['D', 1138, 0, 398, 375],
          ['E', 0, 375, 430, 330],
          ['F', 430, 375, 364, 330],
          ['G', 794, 375, 344, 330],
          ['H', 1138, 375, 398, 330],
          ['I', 0, 705, 991, 319],
          ['J', 991, 705, 545, 319]
        ]
      },
      {
        id: 'reference-08-neuropixels-central-heatmap',
        title: 'Neuropixels central heatmap',
        panels: [
          ['A', 14, 14, 391, 263],
          ['B', 14, 295, 391, 268],
          ['C', 421, 14, 636, 605],
          ['D', 1079, 14, 440, 198],
          ['E', 1079, 226, 440, 229],
          ['F', 1079, 474, 440, 210],
          ['G', 14, 590, 776, 382],
          ['H', 807, 717, 712, 255]
        ]
      }
    ];

    const state = { index: 0, mode: 'generated' };
    const rail = document.getElementById('rail');
    const figureId = document.getElementById('figureId');
    const figureMeta = document.getElementById('figureMeta');
    const modeButton = document.getElementById('modeButton');
    const openLink = document.getElementById('openLink');
    const stage = document.getElementById('stage');
    const surface = document.getElementById('surface');
    const reference = document.getElementById('reference');
    const badge = document.getElementById('badge');

    function panelId(figure, panel) {
      return `${figure.id}-${panel[0]}`;
    }

    function panelHtml(figure, panel) {
      const id = panelId(figure, panel);
      return `./${id}-vectorize-figure-batch/${id}.html?viewer=${VIEWER_VERSION}`;
    }

    function setScale() {
      const scale = stage.clientWidth / 1536;
      surface.style.transform = `scale(${scale})`;
      reference.style.transform = `scale(${scale})`;
    }

    function renderRail() {
      rail.innerHTML = '';
      figures.forEach((figure, index) => {
        const button = document.createElement('button');
        button.className = `thumb${index === state.index ? ' active' : ''}`;
        button.type = 'button';
        button.textContent = String(index + 1).padStart(2, '0');
        button.title = figure.id;
        button.addEventListener('click', () => selectFigure(index));
        rail.appendChild(button);
      });
    }

    function updateMode() {
      const generated = state.mode === 'generated';
      surface.classList.toggle('hidden', !generated);
      reference.classList.toggle('hidden', generated);
      modeButton.textContent = generated ? 'GEN' : 'REF';
      badge.textContent = generated ? 'PANEL GEN' : 'FULL REF';
      document.body.dataset.mode = state.mode;
      document.body.dataset.generatedSurfaceDisplay = getComputedStyle(surface).display;
      document.body.dataset.outerReferenceDisplay = getComputedStyle(reference).display;
    }

    function selectFigure(index) {
      state.index = (index + figures.length) % figures.length;
      const figure = figures[state.index];
      figureId.textContent = figure.id;
      figureMeta.textContent = `${figure.title} · ${figure.panels.length} generated panels`;
      reference.src = `../assets/full-reference/${figure.id}.png`;
      reference.alt = `${figure.id} reference`;
      surface.innerHTML = '';
      for (const panel of figure.panels) {
        const frame = document.createElement('iframe');
        frame.className = 'panel-frame';
        frame.title = `${panelId(figure, panel)} generated panel`;
        frame.src = panelHtml(figure, panel);
        frame.style.left = `${panel[1]}px`;
        frame.style.top = `${panel[2]}px`;
        frame.style.width = `${panel[3]}px`;
        frame.style.height = `${panel[4]}px`;
        frame.dataset.panel = panelId(figure, panel);
        surface.appendChild(frame);
      }
      openLink.href = `./full-figure-batch/${figure.id}/${figure.id}.html`;
      document.body.dataset.figure = figure.id;
      document.body.dataset.panelCount = String(figure.panels.length);
      document.body.dataset.genReady = '1';
      updateMode();
      renderRail();
      setScale();
      const url = new URL(window.location.href);
      url.searchParams.set('figure', figure.id);
      url.searchParams.set('mode', state.mode);
      history.replaceState(null, '', url);
    }

    function toggleMode(mode) {
      state.mode = mode || (state.mode === 'generated' ? 'reference' : 'generated');
      updateMode();
      const url = new URL(window.location.href);
      url.searchParams.set('mode', state.mode);
      history.replaceState(null, '', url);
    }

    modeButton.addEventListener('click', () => toggleMode());
    window.addEventListener('resize', setScale);
    window.addEventListener('keydown', event => {
      if (event.key === ' ') {
        event.preventDefault();
        toggleMode();
      } else if (event.key === 'j') {
        selectFigure(state.index + 1);
      } else if (event.key === 'k') {
        selectFigure(state.index - 1);
      }
    });

    const params = new URLSearchParams(window.location.search);
    const initialFigure = params.get('figure') || params.get('id');
    const initialMode = params.get('mode');
    const initialIndex = figures.findIndex(figure => figure.id === initialFigure);
    if (initialMode === 'reference') state.mode = 'reference';
    selectFigure(initialIndex >= 0 ? initialIndex : 0);
  </script>
</body>
</html>
