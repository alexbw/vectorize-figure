<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>reference-07-cross-region-small-multiples-D reconstruction</title>
  <style>
    html,
    body {
      margin: 0;
      background: #eeeeee;
      color: #111111;
      font-family: Arial, Helvetica, sans-serif;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 14px;
      background: #ffffff;
      border-bottom: 1px solid #cfcfcf;
      box-sizing: border-box;
    }

    h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    .note {
      margin-top: 3px;
      font-size: 12px;
      color: #555555;
    }

    .toggle {
      display: inline-flex;
      border: 1px solid #aaaaaa;
      border-radius: 4px;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .toggle button {
      border: 0;
      padding: 5px 10px;
      background: #ffffff;
      color: #111111;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }

    .toggle button.active {
      background: #111111;
      color: #ffffff;
    }

    main {
      min-height: calc(100vh - 48px);
      display: grid;
      place-items: center;
      padding: 16px;
      box-sizing: border-box;
    }

    .frame {
      position: relative;
      background: #ffffff;
      border: 1px solid #d0d0d0;
      box-shadow: 0 1px 5px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .surface,
    .reference-wrap {
      position: absolute;
      inset: 0;
    }

    .reference-wrap {
      display: none;
      background: #ffffff;
    }

    .reference-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .qa-label {
      position: absolute;
      left: 8px;
      top: 8px;
      padding: 3px 6px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid #bbbbbb;
      font-size: 11px;
      color: #333333;
    }

    .show-reference .surface {
      display: none;
    }

    .show-reference .reference-wrap {
      display: block;
    }

    svg {
      position: absolute;
      inset: 0;
      overflow: visible;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 id="document-title">Cross-region correlation reconstruction</h1>
      <div class="note">Generated candidate is rendered from JSON. Source image is QA-only.</div>
    </div>
    <div class="toggle" aria-label="View mode">
      <button id="generatedButton" class="active" type="button">Generated</button>
      <button id="referenceButton" type="button">QA reference</button>
    </div>
  </header>

  <main>
    <div id="frame" class="frame">
      <div id="surface" class="surface"></div>
      <div id="referenceWrap" class="reference-wrap">
        <img id="reference" alt="QA reference source image">
        <div class="qa-label">QA reference only - source raster is not used by generated view</div>
      </div>
    </div>
  </main>

  <script>
    const SVG_NS = 'http://www.w3.org/2000/svg';

    function $(id) {
      return document.getElementById(id);
    }

    function svgEl(tag, attrs = {}) {
      const node = document.createElementNS(SVG_NS, tag);
      for (const [key, value] of Object.entries(attrs)) {
        if (value !== undefined && value !== null) node.setAttribute(key, value);
      }
      return node;
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function hexToRgb(hex) {
      const normalized = hex.replace('#', '');
      return [
        parseInt(normalized.slice(0, 2), 16),
        parseInt(normalized.slice(2, 4), 16),
        parseInt(normalized.slice(4, 6), 16)
      ];
    }

    function rgbToHex(rgb) {
      return `#${rgb.map(v => Math.round(v).toString(16).padStart(2, '0')).join('')}`;
    }

    function interpolateColor(stops, t) {
      const clamped = Math.max(0, Math.min(1, t));
      const scaled = clamped * (stops.length - 1);
      const index = Math.min(stops.length - 2, Math.floor(scaled));
      const localT = scaled - index;
      const a = hexToRgb(stops[index]);
      const b = hexToRgb(stops[index + 1]);
      return rgbToHex(a.map((channel, i) => lerp(channel, b[i], localT)));
    }

    function formatValue(value, pattern) {
      if (pattern === '.2f') return value.toFixed(2);
      return String(value);
    }

    function textNode(text, attrs = {}) {
      const node = svgEl('text', attrs);
      node.textContent = text;
      return node;
    }

    function renderSpec(spec) {
      document.title = `${spec.id} reconstruction`;
      $('document-title').textContent = `${spec.id} reconstruction`;

      const frame = $('frame');
      frame.style.width = `${spec.canvas.width}px`;
      frame.style.height = `${spec.canvas.height}px`;
      frame.style.background = spec.canvas.background;

      const reference = $('reference');
      reference.src = spec.source.path;

      const surface = $('surface');
      surface.textContent = '';

      const svg = svgEl('svg', {
        width: spec.canvas.width,
        height: spec.canvas.height,
        viewBox: `0 0 ${spec.canvas.width} ${spec.canvas.height}`,
        role: 'img',
        'aria-label': 'Generated cross-region correlation heatmap'
      });
      surface.appendChild(svg);

      const defs = svgEl('defs');
      svg.appendChild(defs);

      const panel = spec.panels[0];
      const plot = panel.plot;
      const matrix = panel.data.matrix;
      const colorSystem = spec.coordinateSystems.find(system => system.id === panel.colorbar.usesTransform);
      const colorStops = colorSystem.range;
      const font = spec.typography.fontFamily;

      svg.appendChild(svgEl('rect', {
        x: 0,
        y: 0,
        width: spec.canvas.width,
        height: spec.canvas.height,
        fill: spec.canvas.background
      }));

      svg.appendChild(textNode(panel.label.text, {
        id: panel.label.id,
        x: panel.label.x,
        y: panel.label.y,
        'font-family': font,
        'font-size': panel.label.fontSize,
        'font-weight': panel.label.fontWeight,
        fill: spec.typography.color,
        'text-anchor': panel.label.anchor,
        'data-mark': 'panel-label'
      }));

      svg.appendChild(textNode(panel.title.text, {
        id: panel.title.id,
        x: panel.title.x,
        y: panel.title.y,
        'font-family': font,
        'font-size': panel.title.fontSize,
        'font-weight': panel.title.fontWeight,
        fill: spec.typography.color,
        'text-anchor': panel.title.anchor,
        'data-mark': 'panel-title'
      }));

      const box = plot.dataBbox;
      const cellW = box.width / matrix.columnOrder.length;
      const cellH = box.height / matrix.rowOrder.length;
      const cellLayer = svgEl('g', {id: 'panel-d-heatmap-cell-layer'});
      const labelLayer = svgEl('g', {id: 'panel-d-heatmap-label-layer'});
      svg.appendChild(cellLayer);
      svg.appendChild(labelLayer);

      matrix.values.forEach((row, rowIndex) => {
        row.forEach((value, columnIndex) => {
          const x = box.x + columnIndex * cellW;
          const y = box.y + rowIndex * cellH;
          const fill = interpolateColor(colorStops, value);
          const textFill = value >= 0.72 ? '#ffffff' : '#111111';
          cellLayer.appendChild(svgEl('rect', {
            id: `cell-${matrix.rowOrder[rowIndex].toLowerCase()}-${matrix.columnOrder[columnIndex].toLowerCase()}`,
            x: x.toFixed(2),
            y: y.toFixed(2),
            width: cellW.toFixed(2),
            height: cellH.toFixed(2),
            fill,
            stroke: spec.styleTokens.cellStroke,
            'stroke-width': panel.marks[0].cellStrokeWidth,
            'shape-rendering': 'crispEdges',
            'data-mark': 'heatmap-cell',
            'data-row': matrix.rowOrder[rowIndex],
            'data-column': matrix.columnOrder[columnIndex],
            'data-value': value
          }));
          labelLayer.appendChild(textNode(formatValue(value, matrix.valueFormat), {
            x: (x + cellW / 2).toFixed(2),
            y: (y + cellH / 2 + 1).toFixed(2),
            'font-family': font,
            'font-size': panel.marks[0].label.fontSize,
            'font-weight': panel.marks[0].label.fontWeight,
            fill: textFill,
            'text-anchor': panel.marks[0].label.anchor,
            'dominant-baseline': panel.marks[0].label.baseline,
            'data-mark': 'cell-value',
            'data-row': matrix.rowOrder[rowIndex],
            'data-column': matrix.columnOrder[columnIndex]
          }));
        });
      });

      svg.appendChild(svgEl('rect', {
        x: box.x,
        y: box.y,
        width: box.width,
        height: box.height,
        fill: 'none',
        stroke: spec.styleTokens.matrixBorder,
        'stroke-width': 1.1,
        'data-mark': 'matrix-border'
      }));

      plot.x.categories.forEach((category, index) => {
        svg.appendChild(textNode(category.label, {
          x: (box.x + index * cellW + cellW / 2).toFixed(2),
          y: plot.x.tickBand.y,
          'font-family': font,
          'font-size': plot.x.tickBand.fontSize,
          fill: category.color,
          'text-anchor': plot.x.tickBand.anchor,
          'data-mark': 'category-label',
          'data-axis': 'x',
          'data-category': category.label
        }));
      });

      plot.y.categories.forEach((category, index) => {
        svg.appendChild(textNode(category.label, {
          x: plot.y.tickBand.x,
          y: (box.y + index * cellH + cellH / 2 + 5).toFixed(2),
          'font-family': font,
          'font-size': plot.y.tickBand.fontSize,
          fill: category.color,
          'text-anchor': plot.y.tickBand.anchor,
          'data-mark': 'category-label',
          'data-axis': 'y',
          'data-category': category.label
        }));
      });

      const gradient = svgEl('linearGradient', {
        id: 'pearson-r-gradient',
        x1: '0%',
        x2: '100%',
        y1: '0%',
        y2: '0%'
      });
      colorStops.forEach((color, index) => {
        gradient.appendChild(svgEl('stop', {
          offset: `${index / (colorStops.length - 1) * 100}%`,
          'stop-color': color
        }));
      });
      defs.appendChild(gradient);

      const colorbar = panel.colorbar;
      svg.appendChild(textNode(colorbar.title.text, {
        x: colorbar.title.x,
        y: colorbar.title.y,
        'font-family': font,
        'font-size': colorbar.title.fontSize,
        fill: spec.typography.color,
        'text-anchor': colorbar.title.anchor,
        'data-mark': 'colorbar-title'
      }));
      svg.appendChild(svgEl('rect', {
        x: colorbar.bbox.x,
        y: colorbar.bbox.y,
        width: colorbar.bbox.width,
        height: colorbar.bbox.height,
        fill: 'url(#pearson-r-gradient)',
        stroke: '#333333',
        'stroke-width': 0.8,
        'data-mark': 'colorbar-ramp'
      }));

      const domain = colorSystem.domain;
      colorbar.ticks.forEach(tick => {
        const tx = colorbar.bbox.x + (tick.value - domain[0]) / (domain[1] - domain[0]) * colorbar.bbox.width;
        svg.appendChild(svgEl('line', {
          x1: tx.toFixed(2),
          y1: colorbar.bbox.y + colorbar.bbox.height,
          x2: tx.toFixed(2),
          y2: colorbar.bbox.y + colorbar.bbox.height + colorbar.tickLength,
          stroke: spec.styleTokens.tick,
          'stroke-width': 0.8,
          'data-mark': 'colorbar-tick',
          'data-value': tick.value
        }));
        svg.appendChild(textNode(tick.label, {
          x: tx.toFixed(2),
          y: colorbar.tickLabelY,
          'font-family': font,
          'font-size': 14,
          fill: spec.typography.color,
          'text-anchor': 'middle',
          'data-mark': 'colorbar-tick-label',
          'data-value': tick.value
        }));
      });
    }

    async function loadSpec() {
      try {
        const response = await fetch('reference-07-cross-region-small-multiples-D.json', {cache: 'no-store'});
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } catch (error) {
        throw new Error(`Unable to load adjacent JSON spec: ${error.message}`);
      }
    }

    function setMode(showReference) {
      $('frame').classList.toggle('show-reference', showReference);
      $('generatedButton').classList.toggle('active', !showReference);
      $('referenceButton').classList.toggle('active', showReference);
    }

    $('generatedButton').addEventListener('click', () => setMode(false));
    $('referenceButton').addEventListener('click', () => setMode(true));

    loadSpec().then(renderSpec).catch(error => {
      $('surface').textContent = error.message;
      console.error(error);
    });
  </script>
</body>
</html>
