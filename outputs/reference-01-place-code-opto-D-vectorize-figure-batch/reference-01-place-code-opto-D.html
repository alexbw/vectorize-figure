<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>reference-01-place-code-opto-D reconstruction</title>
  <style>
    html, body { margin: 0; background: #eeeeee; color: #111111; font-family: Arial, Helvetica, sans-serif; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 10px 14px; background: #ffffff; border-bottom: 1px solid #cfcfcf; }
    h1 { margin: 0; font-size: 16px; font-weight: 700; }
    .note { margin-top: 3px; font-size: 12px; color: #555555; }
    .toggle { display: inline-flex; border: 1px solid #aaaaaa; border-radius: 4px; overflow: hidden; }
    .toggle button { border: 0; padding: 5px 10px; background: #ffffff; color: #111111; font: inherit; font-size: 12px; cursor: pointer; }
    .toggle button.active { background: #111111; color: #ffffff; }
    main { min-height: calc(100vh - 48px); display: grid; place-items: center; padding: 16px; box-sizing: border-box; }
    .frame { position: relative; background: #ffffff; border: 1px solid #d0d0d0; box-shadow: 0 1px 5px rgba(0,0,0,0.08); overflow: hidden; }
    .surface, .reference { position: absolute; inset: 0; }
    .reference { display: none; width: 100%; height: 100%; object-fit: contain; background: #ffffff; }
    .show-reference .surface { display: none; }
    .show-reference .reference { display: block; }
    svg { position: absolute; inset: 0; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 id="title">reference-01-place-code-opto-D</h1>
      <div class="note">Generated candidate is rendered from JSON. Source image is QA-only.</div>
    </div>
    <div class="toggle" aria-label="View mode">
      <button id="generatedButton" class="active" type="button">Generated</button>
      <button id="referenceButton" type="button">Reference</button>
    </div>
  </header>
  <main>
    <div id="frame" class="frame">
      <div id="surface" class="surface"></div>
      <img id="reference" class="reference" alt="Reference source image">
    </div>
  </main>
  <script>
    const SVG_NS = "http://www.w3.org/2000/svg";
    const make = (tag, attrs = {}) => {
      const node = document.createElementNS(SVG_NS, tag);
      Object.entries(attrs).forEach(([key, value]) => {
        if (value !== undefined && value !== null) node.setAttribute(key, value);
      });
      return node;
    };
    const scale = (domain, range, value) => range[0] + (value - domain[0]) / (domain[1] - domain[0]) * (range[1] - range[0]);
    const rng = seed => () => {
      seed += 0x6D2B79F5;
      let t = seed;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
    const linePath = pts => pts.map((p, i) => `${i ? "L" : "M"}${p[0].toFixed(2)} ${p[1].toFixed(2)}`).join(" ");
    const addText = (svg, text, attrs) => {
      const node = make("text", attrs);
      node.textContent = text;
      svg.appendChild(node);
      return node;
    };
    const interpBand = (series, x) => {
      const band = series.bandHalfWidth;
      for (let i = 1; i < band.length; i++) {
        if (x <= band[i][0]) {
          const a = band[i - 1], b = band[i];
          const t = (x - a[0]) / (b[0] - a[0]);
          return a[1] + t * (b[1] - a[1]);
        }
      }
      return band[band.length - 1][1];
    };
    const roughPoints = (points, roughness) => {
      if (!roughness) return points;
      const random = rng(roughness.seed);
      const out = [];
      for (let i = 0; i < points.length - 1; i++) {
        const a = points[i], b = points[i + 1];
        if (i === 0) out.push([a[0], a[1] + (random() - 0.5) * roughness.amplitude]);
        for (let s = 1; s <= roughness.samplesPerSegment; s++) {
          const t = s / roughness.samplesPerSegment;
          out.push([a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t + (random() - 0.5) * roughness.amplitude]);
        }
      }
      return out;
    };
    function render(spec) {
      const frame = document.getElementById("frame");
      const surface = document.getElementById("surface");
      const reference = document.getElementById("reference");
      frame.style.width = `${spec.canvas.width}px`;
      frame.style.height = `${spec.canvas.height}px`;
      reference.src = spec.source.path;
      surface.replaceChildren();
      const svg = make("svg", {viewBox: `0 0 ${spec.canvas.width} ${spec.canvas.height}`, width: spec.canvas.width, height: spec.canvas.height, role: "img"});
      surface.appendChild(svg);
      svg.appendChild(make("rect", {x: 0, y: 0, width: spec.canvas.width, height: spec.canvas.height, fill: spec.canvas.background}));
      const panel = spec.panels[0], plot = panel.plot, box = plot.bbox;
      const sx = x => scale(plot.x.domain, [box.x, box.x + box.width], x);
      const sy = y => scale(plot.y.domain, [box.y + box.height, box.y], y);
      const data = new Map(panel.data.series.map(s => [s.id, s]));
      addText(svg, panel.label.text, {x: panel.label.x, y: panel.label.y, "font-size": panel.label.fontSize, "font-weight": panel.label.fontWeight, "font-family": spec.typography.fontFamily});
      addText(svg, panel.title.text, {x: panel.title.x, y: panel.title.y, "font-size": panel.title.fontSize, "font-weight": panel.title.fontWeight, "font-family": spec.typography.fontFamily});
      const legend = panel.layoutObjects.find(o => o.id === "legend");
      legend.items.forEach((item, i) => {
        const series = data.get(item.series);
        const y = legend.y + i * 21;
        svg.appendChild(make("line", {x1: legend.x, y1: y, x2: legend.x + 28, y2: y, stroke: series.color, "stroke-width": 2.5, "stroke-linecap": "round"}));
        addText(svg, item.label, {x: legend.x + 40, y: y + 5, "font-size": 14, "font-family": spec.typography.fontFamily});
      });
      svg.appendChild(make("line", {x1: box.x, y1: box.y + box.height, x2: box.x + box.width, y2: box.y + box.height, stroke: "#111111", "stroke-width": 1}));
      svg.appendChild(make("line", {x1: box.x, y1: box.y, x2: box.x, y2: box.y + box.height, stroke: "#111111", "stroke-width": 1}));
      plot.x.ticks.forEach(t => {
        const x = sx(t.value);
        svg.appendChild(make("line", {x1: x, y1: box.y + box.height, x2: x, y2: box.y + box.height + 6, stroke: "#111111"}));
        addText(svg, t.label, {x, y: box.y + box.height + 22, "font-size": 16, "text-anchor": "middle", "font-family": spec.typography.fontFamily});
      });
      plot.y.ticks.forEach(t => {
        const y = sy(t.value);
        svg.appendChild(make("line", {x1: box.x - 5, y1: y, x2: box.x, y2: y, stroke: "#111111"}));
        addText(svg, t.label, {x: box.x - 8, y: y + 5, "font-size": 15, "text-anchor": "end", "font-family": spec.typography.fontFamily});
      });
      addText(svg, plot.x.label.text, {x: box.x + box.width / 2, y: box.y + box.height + plot.x.label.offset, "font-size": plot.x.label.fontSize, "text-anchor": "middle", "font-family": spec.typography.fontFamily});
      const yTitle = addText(svg, plot.y.label.text, {x: 29, y: box.y + box.height / 2, "font-size": plot.y.label.fontSize, "text-anchor": "middle", "font-family": spec.typography.fontFamily, transform: `rotate(-90 29 ${box.y + box.height / 2})`});
      yTitle.dataset.anchorTo = "y-axis";
      panel.marks.forEach(mark => {
        if (mark.type === "uncertaintyBand") {
          const s = data.get(mark.series);
          const upper = s.points.map(p => [sx(p[0]), sy(p[1] + interpBand(s, p[0]))]);
          const lower = s.points.slice().reverse().map(p => [sx(p[0]), sy(p[1] - interpBand(s, p[0]))]);
          svg.appendChild(make("path", {d: `${linePath(upper)} ${linePath(lower).replace("M", "L")} Z`, fill: s.bandColor, opacity: s.bandOpacity, "data-series": s.id}));
        } else if (mark.type === "lineSeries") {
          const s = data.get(mark.series);
          const pts = roughPoints(s.points, mark.roughness).map(p => [sx(p[0]), sy(p[1])]);
          svg.appendChild(make("path", {d: linePath(pts), fill: "none", stroke: s.color, "stroke-width": mark.strokeWidth, "stroke-linecap": "round", "stroke-linejoin": "round", "data-series": s.id}));
        } else if (mark.type === "eventLine") {
          svg.appendChild(make("line", {x1: sx(0), y1: sy(mark.yRange[1]), x2: sx(0), y2: sy(mark.yRange[0]), stroke: mark.stroke, "stroke-width": mark.strokeWidth, "stroke-dasharray": mark.dasharray}));
        } else if (mark.type === "horizontalRule") {
          svg.appendChild(make("line", {x1: sx(mark.xRange[0]), y1: sy(mark.yValue), x2: sx(mark.xRange[1]), y2: sy(mark.yValue), stroke: mark.stroke, "stroke-width": mark.strokeWidth, "stroke-dasharray": mark.dasharray}));
        } else if (mark.type === "intervalBar") {
          svg.appendChild(make("rect", {x: sx(mark.xRange[0]), y: mark.y, width: sx(mark.xRange[1]) - sx(mark.xRange[0]), height: mark.height, fill: mark.fill}));
          addText(svg, mark.label.text, {x: (sx(mark.xRange[0]) + sx(mark.xRange[1])) / 2, y: mark.y + 14, "font-size": mark.label.fontSize, fill: mark.label.fill, "text-anchor": "middle", "font-family": spec.typography.fontFamily});
        }
      });
      panel.annotations.forEach(a => {
        if (a.type === "text") addText(svg, a.text, {x: a.x, y: sy(a.yValue) + 5, "font-size": a.fontSize, "font-family": spec.typography.fontFamily, fill: a.fill, "text-anchor": a.anchor});
      });
    }
    async function loadSpec() {
      const response = await fetch("reference-01-place-code-opto-D.json");
      return response.json();
    }
    loadSpec().then(render);
    const frame = document.getElementById("frame");
    const generatedButton = document.getElementById("generatedButton");
    const referenceButton = document.getElementById("referenceButton");
    generatedButton.addEventListener("click", () => { frame.classList.remove("show-reference"); generatedButton.classList.add("active"); referenceButton.classList.remove("active"); });
    referenceButton.addEventListener("click", () => { frame.classList.add("show-reference"); referenceButton.classList.add("active"); generatedButton.classList.remove("active"); });
  </script>
</body>
</html>
