<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>reference-01-place-code-opto-C reconstruction</title>
  <style>
    html, body {
      margin: 0;
      background: #eeeeee;
      color: #111111;
      font-family: Arial, Helvetica, sans-serif;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 14px;
      background: #ffffff;
      border-bottom: 1px solid #cfcfcf;
    }

    h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
    }

    .note {
      margin-top: 3px;
      font-size: 12px;
      color: #555555;
    }

    .toggle {
      display: inline-flex;
      border: 1px solid #aaaaaa;
      border-radius: 4px;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .toggle button {
      border: 0;
      padding: 5px 10px;
      background: #ffffff;
      color: #111111;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }

    .toggle button.active {
      background: #111111;
      color: #ffffff;
    }

    main {
      min-height: calc(100vh - 48px);
      display: grid;
      place-items: center;
      padding: 16px;
      box-sizing: border-box;
    }

    .frame {
      position: relative;
      background: #ffffff;
      border: 1px solid #d0d0d0;
      box-shadow: 0 1px 5px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .surface,
    .reference {
      position: absolute;
      inset: 0;
    }

    .reference {
      display: none;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #ffffff;
    }

    .show-reference .surface {
      display: none;
    }

    .show-reference .reference {
      display: block;
    }

    svg,
    canvas {
      position: absolute;
      inset: 0;
    }

  </style>
</head>
<body>
  <header>
    <div>
      <h1 id="title">reference-01-place-code-opto-C</h1>
      <div class="note">Generated candidate is rendered from JSON. Source image is QA-only.</div>
    </div>
    <div class="toggle" aria-label="View mode">
      <button id="generatedButton" class="active" type="button">Generated</button>
      <button id="referenceButton" type="button">Reference</button>
    </div>
  </header>

  <main>
    <div id="frame" class="frame">
      <div id="surface" class="surface"></div>
      <img id="reference" class="reference" alt="Reference source image">
    </div>
  </main>

  <script>
    const SPEC_URL = './reference-01-place-code-opto-C.json';
    const SVG_NS = 'http://www.w3.org/2000/svg';

    function byId(id) {
      return document.getElementById(id);
    }

    function svgNode(tag, attrs = {}) {
      const node = document.createElementNS(SVG_NS, tag);
      for (const [key, value] of Object.entries(attrs)) {
        if (value !== undefined && value !== null) node.setAttribute(key, value);
      }
      return node;
    }

    function textNode(rawSpec, defaults = {}) {
      const spec = calibratedText(rawSpec);
      const fontSize = spec.fontSize || defaults.defaultSize || 13;
      const x = spec.overlayX !== undefined ? spec.overlayX : spec.x;
      const y = spec.overlayY !== undefined ? spec.overlayY : spec.y;
      const node = svgNode('text', {
        x,
        y,
        fill: spec.fill || spec.color || defaults.color || '#111111',
        'font-family': spec.fontFamily || defaults.fontFamily || 'Arial, Helvetica, sans-serif',
        'font-size': fontSize,
        'font-weight': spec.fontWeight || 400,
        'text-anchor': spec.anchor || 'start',
        'dominant-baseline': spec.baseline || 'alphabetic',
        transform: spec.rotation ? `rotate(${spec.rotation} ${x} ${y})` : undefined,
        'data-role': spec.role || 'text',
        'data-text-id': spec.id,
        'data-fit': spec.fit,
        'data-target-width': spec.targetWidth,
        'data-min-scale': spec.minScale,
        'data-max-scale': spec.maxScale
      });

      const lines = String(spec.text || '').split('\n');
      lines.forEach((line, index) => {
        const tspan = svgNode('tspan', {
          x,
          dy: index === 0 ? 0 : (spec.lineHeight || 1.08) * fontSize
        });
        tspan.textContent = line;
        node.appendChild(tspan);
      });

      return node;
    }

    let activeTextCalibration = {};

    function calibratedText(spec = {}) {
      if (!spec.id || !activeTextCalibration[spec.id]) return spec;
      return {...spec, ...activeTextCalibration[spec.id]};
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function applyTextFits(svg) {
      for (const node of svg.querySelectorAll('text[data-fit="scaleX"]')) {
        const targetWidth = Number(node.dataset.targetWidth || 0);
        if (!targetWidth) continue;
        const box = node.getBBox();
        if (!box.width) continue;
        const scale = clamp(
          targetWidth / box.width,
          Number(node.dataset.minScale || 0.4),
          Number(node.dataset.maxScale || 1.45)
        );
        const x = Number(node.getAttribute('x') || 0);
        const y = Number(node.getAttribute('y') || 0);
        const existing = node.getAttribute('transform') || '';
        const fitTransform = `translate(${x} ${y}) scale(${scale} 1) translate(${-x} ${-y})`;
        node.setAttribute('transform', [existing, fitTransform].filter(Boolean).join(' '));
      }
    }

    function numericTickId(prefix, label) {
      const text = String(label);
      const sign = text.startsWith('-') ? 'minus-' : '';
      const normalized = text.replace('-', '').replace(/\.0$/, '').replace('.', '');
      return `${prefix}-${sign}${normalized}`;
    }

    function line(svg, attrs) {
      svg.appendChild(svgNode('line', {
        stroke: attrs.stroke || '#111111',
        'stroke-width': attrs.strokeWidth || 1.4,
        'stroke-dasharray': attrs.dasharray,
        'stroke-linecap': attrs.linecap || 'butt',
        x1: attrs.x1,
        y1: attrs.y1,
        x2: attrs.x2,
        y2: attrs.y2,
        'data-role': attrs.role || 'line'
      }));
    }

    function rect(svg, attrs) {
      svg.appendChild(svgNode('rect', {
        x: attrs.x,
        y: attrs.y,
        width: attrs.width,
        height: attrs.height,
        fill: attrs.fill || 'none',
        stroke: attrs.stroke || 'none',
        'stroke-width': attrs.strokeWidth,
        'data-role': attrs.role || 'rect'
      }));
    }

    function scale(domain, range, value) {
      return range[0] + (value - domain[0]) / (domain[1] - domain[0]) * (range[1] - range[0]);
    }

    function xScale(plot, value) {
      return scale(plot.x.domain, [plot.bbox.x, plot.bbox.x + plot.bbox.width], value);
    }

    function yScale(plot, value) {
      return scale(plot.y.domain, [plot.bbox.y + plot.bbox.height, plot.bbox.y], value);
    }

    function rasterX(rasterPlot, value) {
      const box = rasterPlot.bbox;
      return scale(rasterPlot.domain, [box.x, box.x + box.width], value);
    }

    function pathFromPoints(points, plot) {
      return points.map((point, index) => {
        const command = index === 0 ? 'M' : 'L';
        return `${command}${xScale(plot, point[0]).toFixed(2)} ${yScale(plot, point[1]).toFixed(2)}`;
      }).join(' ');
    }

    function bandPath(series, plot) {
      const halfWidth = series.bandHalfWidth || 1;
      const upper = series.points.map(point => [point[0], point[1] + halfWidth]);
      const lower = series.points.slice().reverse().map(point => [point[0], point[1] - halfWidth]);
      const all = upper.concat(lower);
      return all.map((point, index) => {
        const command = index === 0 ? 'M' : 'L';
        return `${command}${xScale(plot, point[0]).toFixed(2)} ${yScale(plot, point[1]).toFixed(2)}`;
      }).join(' ') + ' Z';
    }

    function rng(seed) {
      return function random() {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function drawRaster(ctx, group, rasterPlot) {
      const random = rng(group.seed);
      const box = group.bbox;
      const eventX = rasterX(rasterPlot, 0) - box.x;
      ctx.save();
      ctx.beginPath();
      ctx.rect(box.x, box.y, box.width, box.height);
      ctx.clip();
      ctx.fillStyle = group.color;

      for (let row = 0; row < group.rows; row += 1) {
        const y = box.y + row / group.rows * box.height + random() * 1.3;
        for (let i = 0; i < group.baselineEvents; i += 1) {
          const x = random() * box.width;
          if (x > eventX && random() < group.postEventDropProbability) continue;
          ctx.globalAlpha = 0.84 + random() * 0.16;
          ctx.fillRect(box.x + x, y, 1.35, 1.35);
        }
      }

      ctx.restore();
      ctx.globalAlpha = 1;
    }

    function renderRasterPanel(svg, ctx, panel, defaults) {
      const rasterPlot = panel.rasterPlot;
      const axisY = rasterPlot.axisY;
      const axisX1 = rasterPlot.bbox.x;
      const axisX2 = rasterPlot.bbox.x + rasterPlot.bbox.width;
      const eventX = rasterX(rasterPlot, panel.event.time);

      svg.appendChild(textNode({...panel.event.label, id: 'event-label'}, defaults));
      line(svg, {x1: eventX, y1: 68, x2: eventX, y2: axisY + 7, stroke: panel.event.color, strokeWidth: 1.4, dasharray: '4 4', role: 'event-line-raster'});

      for (const group of rasterPlot.groups) {
        drawRaster(ctx, group, rasterPlot);
      }

      line(svg, {x1: axisX1, y1: axisY, x2: axisX2, y2: axisY, strokeWidth: 1.4, role: 'raster-x-axis'});

      for (const tick of rasterPlot.ticks) {
        const x = rasterX(rasterPlot, tick.value);
        line(svg, {x1: x, y1: axisY, x2: x, y2: axisY + 7, strokeWidth: 1.4, role: 'raster-x-tick'});
        const tickId = numericTickId('raster-tick', tick.label);
        svg.appendChild(textNode({id: tickId, text: tick.label, x, y: axisY + 21, fontSize: 16, anchor: 'middle'}, defaults));
      }

      svg.appendChild(textNode({...rasterPlot.xLabel, id: 'raster-x-label'}, defaults));

      const control = rasterPlot.groups[0];
      const opto = rasterPlot.groups[1];
      svg.appendChild(textNode({id: 'control-label', text: control.label, x: 44, y: 92, fontSize: 14, anchor: 'middle', fill: control.labelColor}, defaults));
      svg.appendChild(textNode({id: 'control-n', text: control.sampleLabel, x: 44, y: 136, fontSize: 14, anchor: 'middle', fill: '#111111'}, defaults));
      svg.appendChild(textNode({id: 'opto-label', text: opto.label, x: 44, y: 195, fontSize: 14, anchor: 'middle', fill: opto.labelColor}, defaults));
      svg.appendChild(textNode({id: 'opto-n', text: opto.sampleLabel, x: 44, y: 254, fontSize: 14, anchor: 'middle', fill: '#111111'}, defaults));
    }

    function renderLinePanel(svg, panel, defaults) {
      const plot = panel.linePlot;
      const box = plot.bbox;
      const eventX = xScale(plot, panel.event.time);

      for (const series of plot.series) {
        svg.appendChild(svgNode('path', {
          d: bandPath(series, plot),
          fill: series.bandFill,
          stroke: 'none',
          'data-mark-id': `${series.id}-band`,
          'data-role': 'uncertainty-band'
        }));
      }

      for (const series of plot.series) {
        svg.appendChild(svgNode('path', {
          d: pathFromPoints(series.points, plot),
          fill: 'none',
          stroke: series.stroke,
          'stroke-width': series.strokeWidth || 3,
          'stroke-linecap': 'round',
          'stroke-linejoin': 'round',
          'data-mark-id': series.id,
          'data-role': 'line-series'
        }));
      }

      line(svg, {x1: eventX, y1: box.y - 4, x2: eventX, y2: box.y + box.height + 6, stroke: panel.event.color, strokeWidth: 1.4, dasharray: '4 4', role: 'event-line-mean'});
      line(svg, {x1: box.x, y1: box.y + box.height, x2: box.x + box.width, y2: box.y + box.height, strokeWidth: 1.4, role: 'line-x-axis'});
      line(svg, {x1: box.x, y1: box.y, x2: box.x, y2: box.y + box.height, strokeWidth: 1.4, role: 'line-y-axis'});

      for (const tick of plot.x.ticks) {
        const x = xScale(plot, tick.value);
        line(svg, {x1: x, y1: box.y + box.height, x2: x, y2: box.y + box.height + 7, strokeWidth: 1.4, role: 'line-x-tick'});
        const tickId = numericTickId('line-tick', tick.label);
        svg.appendChild(textNode({id: tickId, text: tick.label, x, y: box.y + box.height + 24, fontSize: 16, anchor: 'middle'}, defaults));
      }

      for (const tick of plot.y.ticks) {
        const y = yScale(plot, tick.value);
        line(svg, {x1: box.x - 6, y1: y, x2: box.x, y2: y, strokeWidth: 1.4, role: 'line-y-tick'});
        svg.appendChild(textNode({id: `line-y-tick-${tick.label}`, text: tick.label, x: box.x - 10, y: y + 5, fontSize: 16, anchor: 'end'}, defaults));
      }

      svg.appendChild(textNode({...plot.x.label, id: 'line-x-label'}, defaults));
      svg.appendChild(textNode({...plot.y.label, id: 'line-y-label'}, defaults));

      rect(svg, {
        x: plot.lightBar.x,
        y: plot.lightBar.y,
        width: plot.lightBar.width,
        height: plot.lightBar.height,
        fill: plot.lightBar.fill,
        role: 'light-bar'
      });
      svg.appendChild(textNode({...plot.lightBar.label, id: 'light-on'}, defaults));

      for (const item of plot.legend) {
        const series = plot.series.find(candidate => candidate.id === item.seriesId);
        if (!series) continue;
        line(svg, {x1: item.x, y1: item.y, x2: item.x + 28, y2: item.y, stroke: series.stroke, strokeWidth: 3, linecap: 'round', role: 'legend-line'});
        const id = series.id === 'control-mean' ? 'legend-control' : 'legend-opto';
        svg.appendChild(textNode({id, text: series.label, x: item.textX, y: item.textY, fontSize: 13, anchor: 'start'}, defaults));
      }
    }

    function render(spec) {
      const frame = byId('frame');
      const surface = byId('surface');
      const reference = byId('reference');
      const canvasSpec = spec.canvas;
      const defaults = spec.typography || {};
      activeTextCalibration = Object.assign({}, ...(spec.panels || []).map(panel => panel.textCalibration || {}));

      byId('title').textContent = spec.id;
      document.title = `${spec.id} reconstruction`;
      frame.style.width = `${canvasSpec.width}px`;
      frame.style.height = `${canvasSpec.height}px`;
      frame.style.background = canvasSpec.background || '#ffffff';
      surface.innerHTML = '';
      reference.src = spec.source.path;

      const canvas = document.createElement('canvas');
      canvas.width = canvasSpec.width;
      canvas.height = canvasSpec.height;
      surface.appendChild(canvas);
      const ctx = canvas.getContext('2d');

      const svg = svgNode('svg', {
        width: canvasSpec.width,
        height: canvasSpec.height,
        viewBox: `0 0 ${canvasSpec.width} ${canvasSpec.height}`,
        role: 'img',
        'aria-label': `${spec.id} generated reconstruction`
      });
      surface.appendChild(svg);

      for (const panel of spec.panels) {
        const group = svgNode('g', {'data-panel-id': panel.id, 'data-role': panel.type});
        svg.appendChild(group);
        group.appendChild(textNode({...panel.label, id: 'panel-label'}, defaults));
        group.appendChild(textNode({...panel.title, id: 'panel-title'}, defaults));
        renderRasterPanel(group, ctx, panel, defaults);
        renderLinePanel(group, panel, defaults);
      }

      const afterFonts = document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve();
      afterFonts.then(() => applyTextFits(svg));
    }

    byId('generatedButton').onclick = () => {
      byId('frame').classList.remove('show-reference');
      byId('generatedButton').classList.add('active');
      byId('referenceButton').classList.remove('active');
    };

    byId('referenceButton').onclick = () => {
      byId('frame').classList.add('show-reference');
      byId('referenceButton').classList.add('active');
      byId('generatedButton').classList.remove('active');
    };

    fetch(SPEC_URL)
      .then(response => response.json())
      .then(render)
      .catch(error => {
        byId('surface').textContent = `Failed to load ${SPEC_URL}: ${error.message}`;
      });
  </script>
</body>
</html>
