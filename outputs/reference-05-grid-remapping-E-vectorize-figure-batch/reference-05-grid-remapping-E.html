<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>reference-05-grid-remapping-E reconstruction</title>
  <style>
    html, body { margin: 0; background: #eeeeee; color: #111111; font-family: Arial, Helvetica, sans-serif; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 10px 14px; background: #ffffff; border-bottom: 1px solid #cfcfcf; }
    h1 { margin: 0; font-size: 16px; font-weight: 700; }
    .note { margin-top: 3px; font-size: 12px; color: #555555; }
    .toggle { display: inline-flex; border: 1px solid #999999; border-radius: 4px; overflow: hidden; }
    .toggle button { border: 0; padding: 5px 10px; background: #ffffff; color: #111111; font: inherit; font-size: 12px; cursor: pointer; }
    .toggle button.active { background: #111111; color: #ffffff; }
    main { min-height: calc(100vh - 49px); display: grid; place-items: center; padding: 16px; box-sizing: border-box; }
    .frame { position: relative; background: #ffffff; border: 1px solid #d0d0d0; box-shadow: 0 1px 5px rgba(0,0,0,0.08); overflow: hidden; }
    .surface, .reference { position: absolute; inset: 0; }
    .reference { display: none; width: 100%; height: 100%; object-fit: contain; background-color: #ffffff; }
    .show-reference .surface { display: none; }
    .show-reference .reference { display: block; }
    canvas, svg { position: absolute; inset: 0; }
    text { dominant-baseline: alphabetic; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>reference-05-grid-remapping-E</h1>
      <div class="note">Generated candidate is rendered from JSON. Source image is QA-only.</div>
    </div>
    <div class="toggle" aria-label="View mode">
      <button id="generatedButton" class="active" type="button">Generated</button>
      <button id="referenceButton" type="button">Reference</button>
    </div>
  </header>
  <main>
    <div id="frame" class="frame">
      <div id="surface" class="surface"></div>
      <img id="reference" class="reference" alt="QA reference source image">
    </div>
  </main>
  <script>
    const SVG_NS = "http://www.w3.org/2000/svg";
    const SPEC_URL = "reference-05-grid-remapping-E.json";

    function el(tag, attrs = {}) {
      const node = document.createElementNS(SVG_NS, tag);
      for (const [key, value] of Object.entries(attrs)) {
        if (value !== undefined && value !== null) node.setAttribute(key, value);
      }
      return node;
    }

    function mulberry32(seed) {
      return function random() {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function scale(domain, range, value) {
      return range[0] + (value - domain[0]) / (domain[1] - domain[0]) * (range[1] - range[0]);
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function hexToRgb(hex) {
      const clean = hex.replace("#", "");
      return [parseInt(clean.slice(0, 2), 16), parseInt(clean.slice(2, 4), 16), parseInt(clean.slice(4, 6), 16)];
    }

    function colorAt(scaleSpec, value) {
      const stops = scaleSpec.range.map(hexToRgb);
      const min = Math.log10(scaleSpec.domain[0]);
      const max = Math.log10(scaleSpec.domain[1]);
      const t = Math.max(0, Math.min(1, (Math.log10(Math.max(value, scaleSpec.domain[0])) - min) / (max - min)));
      const pos = t * (stops.length - 1);
      const i = Math.min(stops.length - 2, Math.floor(pos));
      const f = pos - i;
      const rgb = stops[i].map((c, idx) => Math.round(lerp(c, stops[i + 1][idx], f)));
      return rgb;
    }

    function distanceToPolyline(x, y, points) {
      let best = Infinity;
      for (let i = 0; i < points.length - 1; i++) {
        const [x1, y1] = points[i];
        const [x2, y2] = points[i + 1];
        const dx = x2 - x1;
        const dy = y2 - y1;
        const lengthSq = dx * dx + dy * dy || 1;
        const t = Math.max(0, Math.min(1, ((x - x1) * dx + (y - y1) * dy) / lengthSq));
        const px = x1 + t * dx;
        const py = y1 + t * dy;
        const dist = Math.hypot(x - px, y - py);
        if (dist < best) best = dist;
      }
      return best;
    }

    function drawHeatmap(ctx, panel, mark, colorScale) {
      const box = panel.bbox;
      const recipe = mark.recipe;
      const cols = Math.round(box.width);
      const rows = Math.round(box.height);
      const rand = mulberry32(recipe.seed);
      const image = ctx.createImageData(cols, rows);
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const x = scale([0, cols - 1], [0, 220], col);
          const y = scale([rows - 1, 0], [0, 220], row);
          const dist = distanceToPolyline(x, y, recipe.ridge.points);
          let value = recipe.ridge.amplitude * Math.exp(-(dist * dist) / (2 * recipe.ridge.sigma * recipe.ridge.sigma));
          value += rand() * recipe.backgroundNoise;
          if (rand() < recipe.speckleDensity) value += rand() * 0.18;
          value = Math.max(0.0001, Math.min(1, value));
          const [r, g, b] = colorAt(colorScale, value);
          const idx = (row * cols + col) * 4;
          image.data[idx] = r;
          image.data[idx + 1] = g;
          image.data[idx + 2] = b;
          image.data[idx + 3] = 255;
        }
      }
      ctx.putImageData(image, Math.round(box.x), Math.round(box.y));
    }

    function addText(svg, textSpec) {
      const text = el("text", {
        x: textSpec.x,
        y: textSpec.y,
        "font-size": textSpec.fontSize,
        "font-weight": textSpec.fontWeight || 400,
        "font-family": textSpec.fontFamily,
        fill: textSpec.fill || "#111111",
        "text-anchor": textSpec.anchor || "start",
        transform: textSpec.rotation ? `rotate(${textSpec.rotation} ${textSpec.x} ${textSpec.y})` : undefined,
        "data-id": textSpec.id
      });
      text.textContent = textSpec.text;
      svg.appendChild(text);
      return text;
    }

    function renderAxes(svg, panel, tokens) {
      const box = panel.bbox;
      const plot = panel.plot;
      svg.appendChild(el("rect", {x: box.x, y: box.y, width: box.width, height: box.height, fill: "none", stroke: tokens.plotBorder, "stroke-width": tokens.axisStrokeWidth}));
      const xAxisY = box.y + box.height;
      const yAxisX = box.x;
      for (const tick of plot.axes.x.ticks) {
        const x = scale(plot.axes.x.domain, [box.x, box.x + box.width], tick.value);
        svg.appendChild(el("line", {x1: x, y1: xAxisY, x2: x, y2: xAxisY + plot.axes.x.tickLength, stroke: tokens.axisStroke, "stroke-width": tokens.axisStrokeWidth, "data-axis": plot.axes.x.id, "data-value": tick.value}));
        addText(svg, {text: tick.label, x, y: xAxisY + 25, fontSize: tokens.tickFontSize, anchor: "middle"});
      }
      for (const tick of plot.axes.y.ticks) {
        const y = scale(plot.axes.y.domain, [box.y + box.height, box.y], tick.value);
        svg.appendChild(el("line", {x1: yAxisX - plot.axes.y.tickLength, y1: y, x2: yAxisX, y2: y, stroke: tokens.axisStroke, "stroke-width": tokens.axisStrokeWidth, "data-axis": plot.axes.y.id, "data-value": tick.value}));
        if (tick.label) addText(svg, {text: tick.label, x: yAxisX - 15, y: y + 6, fontSize: tokens.tickFontSize, anchor: "end"});
      }
    }

    function renderColorbar(svg, spec, colorScale) {
      const cb = spec.layoutObjects.find(item => item.type === "colorbar");
      const defs = el("defs");
      const gradient = el("linearGradient", {id: "posterior-gradient", x1: "0%", y1: "100%", x2: "0%", y2: "0%"});
      colorScale.range.forEach((color, i) => gradient.appendChild(el("stop", {offset: `${i / (colorScale.range.length - 1) * 100}%`, "stop-color": color})));
      defs.appendChild(gradient);
      svg.appendChild(defs);
      svg.appendChild(el("rect", {x: cb.bbox.x, y: cb.bbox.y, width: cb.bbox.width, height: cb.bbox.height, fill: "url(#posterior-gradient)", stroke: "#111111", "stroke-width": 0.8}));
      cb.title.lines.forEach((line, i) => addText(svg, {text: line, x: cb.title.x, y: cb.title.y + i * 17, fontSize: cb.title.fontSize, anchor: cb.title.anchor}));
      for (const tick of cb.ticks) {
        const logMin = Math.log10(colorScale.domain[0]);
        const logMax = Math.log10(colorScale.domain[1]);
        const t = (Math.log10(tick.value) - logMin) / (logMax - logMin);
        const y = cb.bbox.y + cb.bbox.height - t * cb.bbox.height;
        svg.appendChild(el("line", {x1: cb.bbox.x + cb.bbox.width, y1: y, x2: cb.bbox.x + cb.bbox.width + 5, y2: y, stroke: "#111111", "stroke-width": 0.8}));
        addText(svg, {text: tick.label, x: cb.bbox.x + cb.bbox.width + 8, y: y + 5, fontSize: 15, anchor: "start"});
      }
    }

    function render(spec) {
      const frame = document.getElementById("frame");
      const surface = document.getElementById("surface");
      const reference = document.getElementById("reference");
      frame.style.width = `${spec.canvas.width}px`;
      frame.style.height = `${spec.canvas.height}px`;
      reference.src = spec.source.path;
      surface.innerHTML = "";

      const canvas = document.createElement("canvas");
      canvas.width = spec.canvas.width;
      canvas.height = spec.canvas.height;
      surface.appendChild(canvas);
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = spec.canvas.background;
      ctx.fillRect(0, 0, spec.canvas.width, spec.canvas.height);

      const colorScale = spec.coordinateSystems.find(system => system.id === "posterior.color");
      for (const panel of spec.panels) {
        for (const mark of panel.marks.filter(item => item.type === "heatmap")) drawHeatmap(ctx, panel, mark, colorScale);
      }

      const svg = el("svg", {viewBox: `0 0 ${spec.canvas.width} ${spec.canvas.height}`, width: spec.canvas.width, height: spec.canvas.height, role: "img"});
      surface.appendChild(svg);
      const tokens = spec.rendering.styleTokens;
      for (const panel of spec.panels) renderAxes(svg, panel, tokens);
      for (const item of spec.layoutObjects) {
        if (item.type === "panelTitle") item.lines.forEach(line => addText(svg, {...line, fontSize: item.fontSize, fontWeight: item.fontWeight, fill: item.fill, anchor: item.anchor}));
        if (["panelLabel", "title", "axisTitle"].includes(item.type)) addText(svg, item);
      }
      renderColorbar(svg, spec, colorScale);
    }

    async function main() {
      const response = await fetch(SPEC_URL);
      const spec = await response.json();
      render(spec);
      const frame = document.getElementById("frame");
      const generatedButton = document.getElementById("generatedButton");
      const referenceButton = document.getElementById("referenceButton");
      generatedButton.addEventListener("click", () => {
        frame.classList.remove("show-reference");
        generatedButton.classList.add("active");
        referenceButton.classList.remove("active");
      });
      referenceButton.addEventListener("click", () => {
        frame.classList.add("show-reference");
        referenceButton.classList.add("active");
        generatedButton.classList.remove("active");
      });
    }

    main().catch(error => {
      document.body.insertAdjacentHTML("beforeend", `<pre>${String(error)}</pre>`);
      throw error;
    });
  </script>
</body>
</html>
