<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>reference-05-grid-remapping-F reconstruction</title>
  <style>
    html, body { margin: 0; background: #eeeeee; color: #111111; font-family: Arial, Helvetica, sans-serif; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 10px 14px; background: #ffffff; border-bottom: 1px solid #cfcfcf; }
    h1 { margin: 0; font-size: 16px; font-weight: 700; }
    .note { margin-top: 3px; font-size: 12px; color: #555555; }
    .toggle { display: inline-flex; border: 1px solid #aaaaaa; border-radius: 4px; overflow: hidden; }
    .toggle button { border: 0; padding: 5px 10px; background: #ffffff; color: #111111; font: inherit; font-size: 12px; cursor: pointer; }
    .toggle button.active { background: #111111; color: #ffffff; }
    main { min-height: calc(100vh - 49px); display: grid; place-items: center; padding: 16px; box-sizing: border-box; }
    .frame { position: relative; width: 566px; height: 524px; background: #ffffff; box-shadow: 0 1px 5px rgba(0, 0, 0, 0.08); overflow: hidden; }
    .surface, .reference { position: absolute; inset: 0; }
    .reference { display: none; width: 100%; height: 100%; object-fit: contain; background: #ffffff; }
    .show-reference .surface { display: none; }
    .show-reference .reference { display: block; }
    svg { position: absolute; inset: 0; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 id="title">reference-05-grid-remapping-F</h1>
      <div class="note">Generated candidate is rendered from JSON. Source image is QA-only.</div>
    </div>
    <div class="toggle" aria-label="View mode">
      <button id="generatedButton" class="active" type="button">Generated</button>
      <button id="referenceButton" type="button">Reference</button>
    </div>
  </header>
  <main>
    <div id="frame" class="frame">
      <div id="surface" class="surface"></div>
      <img id="reference" class="reference" alt="Reference source image for QA only">
    </div>
  </main>
  <script>
    const SVG_NS = "http://www.w3.org/2000/svg";
    const specUrl = "reference-05-grid-remapping-F.json";

    function $(id) { return document.getElementById(id); }
    function svgEl(tag, attrs = {}) {
      const node = document.createElementNS(SVG_NS, tag);
      for (const [key, value] of Object.entries(attrs)) {
        if (value !== undefined && value !== null) node.setAttribute(key, String(value));
      }
      return node;
    }
    function yScale(box, domain, value) {
      return box.y + box.height - ((value - domain[0]) / (domain[1] - domain[0])) * box.height;
    }
    function multilineText(parent, item) {
      const text = svgEl("text", {
        id: item.id,
        x: item.x,
        y: item.y,
        "font-size": item.fontSize,
        "font-weight": item.fontWeight || 400,
        "font-style": item.fontStyle || "normal",
        "text-anchor": item.anchor || "start",
        fill: item.fill || "#111111"
      });
      const lines = item.text.split("\n");
      lines.forEach((line, index) => {
        const span = svgEl("tspan", { x: item.x, dy: index === 0 ? 0 : item.fontSize * 1.1 });
        span.textContent = line;
        text.appendChild(span);
      });
      parent.appendChild(text);
    }
    function drawText(parent, item) {
      if (item.text.includes("\n")) return multilineText(parent, item);
      const text = svgEl("text", {
        id: item.id,
        x: item.x,
        y: item.y,
        "font-size": item.fontSize,
        "font-weight": item.fontWeight || 400,
        "font-style": item.fontStyle || "normal",
        "text-anchor": item.anchor || "start",
        fill: item.fill || "#111111",
        transform: item.rotation ? `rotate(${item.rotation} ${item.x} ${item.y})` : null
      });
      text.textContent = item.text;
      parent.appendChild(text);
    }
    function pathFromPoints(points) {
      return points.map((p, i) => `${i ? "L" : "M"} ${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" ");
    }
    function render(spec) {
      $("title").textContent = spec.id;
      const frame = $("frame");
      frame.style.width = `${spec.canvas.width}px`;
      frame.style.height = `${spec.canvas.height}px`;
      const reference = $("reference");
      reference.src = spec.source.path;
      const surface = $("surface");
      surface.innerHTML = "";
      const svg = svgEl("svg", { viewBox: `0 0 ${spec.canvas.width} ${spec.canvas.height}`, width: spec.canvas.width, height: spec.canvas.height, role: "img" });
      svg.style.fontFamily = spec.typography.fontFamily;
      surface.appendChild(svg);
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: spec.canvas.width, height: spec.canvas.height, fill: spec.canvas.background }));
      const panel = spec.panels[0];
      drawText(svg, panel.label);
      drawText(svg, panel.title);
      renderPairedPlot(svg, panel, spec);
      renderViolinInset(svg, panel, spec);
    }
    function renderPairedPlot(svg, panel, spec) {
      const tokens = spec.styleTokens;
      const plot = panel.plot;
      const box = plot.bbox;
      const yDomain = spec.coordinateSystems.find(d => d.id === "paired.xy").y.domain;
      const y = value => yScale(box, yDomain, value);
      svg.appendChild(svgEl("line", { id: plot.axes.yAxis.id, x1: box.x, y1: box.y, x2: box.x, y2: box.y + box.height, stroke: tokens.axisStroke, "stroke-width": 1.6 }));
      plot.axes.yAxis.ticks.forEach(tick => {
        const yy = y(tick.value);
        svg.appendChild(svgEl("line", { class: "tick paired-y", x1: box.x, y1: yy, x2: box.x - plot.axes.yAxis.tickLength, y2: yy, stroke: tokens.axisStroke, "stroke-width": 1.3, "data-value": tick.value }));
        const label = svgEl("text", { x: box.x - 12, y: yy + 5, "font-size": 18, "text-anchor": "end", fill: "#111111" });
        label.textContent = tick.label;
        svg.appendChild(label);
      });
      drawText(svg, { id: "paired-y-label", ...plot.axes.yAxis.label, fontSize: 18, fontWeight: 400, anchor: "middle" });
      const zeroY = y(plot.axes.zeroLine.value);
      svg.appendChild(svgEl("line", { id: plot.axes.zeroLine.id, x1: plot.axes.zeroLine.x1, y1: zeroY, x2: plot.axes.zeroLine.x2, y2: zeroY, stroke: tokens.dashStroke, "stroke-width": 1.5, "stroke-dasharray": plot.axes.zeroLine.dasharray }));
      const paired = panel.marks.find(mark => mark.id === "paired-remapping-lines");
      const xA = paired.xPositions.A;
      const xB = paired.xPositions.B;
      paired.data.forEach(row => {
        const yA = y(row.A);
        const yB = y(row.B);
        svg.appendChild(svgEl("line", { class: "paired-link", x1: xA, y1: yA, x2: xB, y2: yB, stroke: paired.style.lineStroke, "stroke-width": paired.style.lineWidth, "stroke-opacity": paired.style.lineOpacity, "data-animal": row.id }));
      });
      paired.data.forEach(row => {
        svg.appendChild(svgEl("circle", { class: "environment-a-point", cx: xA, cy: y(row.A), r: paired.markerRadius, fill: paired.style.fillA, stroke: "#5a2209", "stroke-width": 0.5, "data-animal": row.id }));
        svg.appendChild(svgEl("circle", { class: "environment-b-point", cx: xB, cy: y(row.B), r: paired.markerRadius, fill: paired.style.fillB, stroke: "#005a60", "stroke-width": 0.5, "data-animal": row.id }));
      });
      plot.axes.xAxis.categories.forEach(cat => {
        const label = svgEl("text", { x: cat.x, y: 441, "font-size": 19, "text-anchor": "middle", fill: cat.color });
        label.textContent = cat.label;
        svg.appendChild(label);
      });
    }
    function renderViolinInset(svg, panel, spec) {
      const tokens = spec.styleTokens;
      const cs = spec.coordinateSystems.find(d => d.id === "delta.xy");
      const box = cs.plotBbox;
      const y = value => yScale(box, cs.y.domain, value);
      panel.annotations.filter(a => a.type === "text").forEach(a => {
        if (a.id === "p-value") {
          const text = svgEl("text", { id: a.id, x: a.x, y: a.y, "font-size": a.fontSize, "font-style": "italic", fill: "#111111" });
          text.append("p = 2.7 \u00d7 10");
          const sup = svgEl("tspan", { "baseline-shift": "super", "font-size": 10 });
          sup.textContent = "-6";
          text.appendChild(sup);
          svg.appendChild(text);
        } else {
          drawText(svg, a);
        }
      });
      const axis = panel.annotations.find(a => a.id === "delta-axis");
      svg.appendChild(svgEl("line", { id: axis.id, x1: axis.x, y1: box.y, x2: axis.x, y2: box.y + box.height, stroke: tokens.axisStroke, "stroke-width": 1.5 }));
      axis.ticks.forEach(tick => {
        const yy = y(tick.value);
        svg.appendChild(svgEl("line", { class: "tick delta-y", x1: axis.x, y1: yy, x2: axis.x - 6, y2: yy, stroke: tokens.axisStroke, "stroke-width": 1.2, "data-value": tick.value }));
        const label = svgEl("text", { x: axis.x - 10, y: yy + 5, "font-size": 18, "text-anchor": "end", fill: "#111111" });
        label.textContent = tick.label;
        svg.appendChild(label);
      });
      const zeroLine = panel.annotations.find(a => a.id === "delta-zero-line");
      svg.appendChild(svgEl("line", { id: zeroLine.id, x1: zeroLine.x1, y1: y(zeroLine.value), x2: zeroLine.x2, y2: y(zeroLine.value), stroke: tokens.dashStroke, "stroke-width": 1.4, "stroke-dasharray": zeroLine.dasharray }));
      const violin = panel.marks.find(mark => mark.id === "delta-violin");
      const right = violin.outline.map(p => [violin.centerX + p.halfWidth, y(p.y)]);
      const left = violin.outline.slice().reverse().map(p => [violin.centerX - p.halfWidth, y(p.y)]);
      const d = `${pathFromPoints(right)} L ${left.map(p => `${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" L ")} Z`;
      svg.appendChild(svgEl("path", { id: violin.id, d, fill: violin.fill, "fill-opacity": violin.fillOpacity, stroke: violin.stroke, "stroke-width": violin.strokeWidth }));
      violin.interiorBands.forEach((band, index) => {
        svg.appendChild(svgEl("rect", { class: "violin-band", x: violin.centerX - band.width / 2, y: y(band.y2), width: band.width, height: y(band.y1) - y(band.y2), fill: band.fill, opacity: band.opacity, "data-band": index }));
      });
      svg.appendChild(svgEl("line", { id: "violin-whisker", x1: violin.centerX, y1: y(violin.summary.whiskers[0]), x2: violin.centerX, y2: y(violin.summary.whiskers[1]), stroke: "#111111", "stroke-width": 1.4 }));
      svg.appendChild(svgEl("line", { id: "violin-q1", x1: violin.centerX - 17, y1: y(violin.summary.quartiles[0]), x2: violin.centerX + 17, y2: y(violin.summary.quartiles[0]), stroke: tokens.quartileStroke, "stroke-width": 1.6 }));
      svg.appendChild(svgEl("line", { id: "violin-q3", x1: violin.centerX - 17, y1: y(violin.summary.quartiles[1]), x2: violin.centerX + 17, y2: y(violin.summary.quartiles[1]), stroke: tokens.quartileStroke, "stroke-width": 1.6 }));
      svg.appendChild(svgEl("circle", { id: "violin-median", cx: violin.centerX, cy: y(violin.summary.median), r: 5.5, fill: "#111111", stroke: "#ffffff", "stroke-width": 2 }));
    }
    async function main() {
      const response = await fetch(specUrl);
      render(await response.json());
      const frame = $("frame");
      $("generatedButton").addEventListener("click", () => {
        frame.classList.remove("show-reference");
        $("generatedButton").classList.add("active");
        $("referenceButton").classList.remove("active");
      });
      $("referenceButton").addEventListener("click", () => {
        frame.classList.add("show-reference");
        $("referenceButton").classList.add("active");
        $("generatedButton").classList.remove("active");
      });
    }
    main();
  </script>
</body>
</html>
