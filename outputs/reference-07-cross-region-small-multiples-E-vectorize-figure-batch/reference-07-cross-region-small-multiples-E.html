<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>reference-07-cross-region-small-multiples-E reconstruction</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, Helvetica, sans-serif;
      background: #f2f2f2;
      color: #111;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 0 0 12px;
      font-size: 13px;
    }
    .stage {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .figure-frame {
      width: 430px;
      height: 330px;
      background: #fff;
      box-shadow: 0 0 0 1px #d0d0d0;
    }
    .qa-reference {
      display: none;
    }
    .qa-reference.visible {
      display: block;
    }
    .qa-reference .label {
      font-size: 12px;
      font-weight: 700;
      margin: 0 0 5px;
    }
    .qa-reference img {
      width: 430px;
      height: 330px;
      display: block;
      box-shadow: 0 0 0 1px #d0d0d0;
    }
    svg {
      display: block;
      width: 430px;
      height: 330px;
      background: #fff;
    }
    text {
      font-family: Arial, Helvetica, sans-serif;
      dominant-baseline: alphabetic;
      letter-spacing: 0;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <label><input id="qa-toggle" type="checkbox"> Show QA reference image</label>
    <span>Generated SVG candidate from editable JSON</span>
  </div>
  <div class="stage">
    <div id="candidate" class="figure-frame" aria-label="generated reconstruction"></div>
    <div id="qa-reference" class="qa-reference" aria-label="QA reference only">
      <div class="label">QA reference only: source raster, not part of generated candidate</div>
      <img alt="QA reference source raster" src="../../assets/reference/reference-07-cross-region-small-multiples-E-reference.png">
    </div>
  </div>

  <script>
    const fallbackSpec = {
      "canvas": {"width": 430, "height": 330, "background": "#ffffff"},
      "styleTokens": {
        "blue": "#0b58c8",
        "green": "#13833c",
        "orange": "#ff5a14",
        "red": "#ff0000",
        "axis": "#3c3c3c",
        "zeroLine": "#cfcfcf"
      },
      "panels": [{
        "id": "panel-e",
        "label": {"id": "panel-e-label", "text": "E", "x": 7, "y": 52, "fontSize": 24, "fontWeight": 700},
        "title": {"id": "panel-e-title", "text": "Effect sizes (Cohen's d) with 95% CI", "x": 38, "y": 52, "fontSize": 18, "fontWeight": 700},
        "plot": {
          "axes": {
            "xAxis": {
              "id": "panel-e-x-axis",
              "line": {"x1": 38, "y1": 314, "x2": 298, "y2": 314},
              "domain": [-1, 1],
              "ticks": [
                {"value": -1, "label": "1.0"},
                {"value": -0.5, "label": "0.5"},
                {"value": 0, "label": "0"},
                {"value": 0.5, "label": "0.5"},
                {"value": 1, "label": "1.0"}
              ],
              "tickLength": 4
            },
            "zeroLine": {
              "id": "panel-e-zero-line",
              "value": 0,
              "line": {"x1": 168, "y1": 78, "x2": 168, "y2": 314},
              "strokeDasharray": "4 3"
            }
          }
        },
        "data": {"effectSizes": [
          {"id": "row-01", "label": "CA1-CA3", "leftColor": "blue", "rightColor": "blue", "d": 0.44, "ci": [0.21, 0.67], "y": 88},
          {"id": "row-02", "label": "CA1-DG", "leftColor": "blue", "rightColor": "blue", "d": 0.62, "ci": [0.37, 0.86], "y": 112},
          {"id": "row-03", "label": "CA1-PFC", "leftColor": "blue", "rightColor": "orange", "d": 0.78, "ci": [0.52, 1.04], "y": 136},
          {"id": "row-04", "label": "CA1-RSC", "leftColor": "blue", "rightColor": "red", "d": 0.68, "ci": [0.43, 0.94], "y": 159},
          {"id": "row-05", "label": "CA3-DG", "leftColor": "blue", "rightColor": "green", "d": 0.22, "ci": [0.00, 0.45], "y": 183},
          {"id": "row-06", "label": "CA3-PFC", "leftColor": "blue", "rightColor": "orange", "d": 0.36, "ci": [0.13, 0.59], "y": 207},
          {"id": "row-07", "label": "CA3-RSC", "leftColor": "blue", "rightColor": "red", "d": 0.31, "ci": [0.08, 0.54], "y": 230},
          {"id": "row-08", "label": "DG-PFC", "leftColor": "green", "rightColor": "orange", "d": 0.17, "ci": [-0.06, 0.40], "y": 254},
          {"id": "row-09", "label": "DG-RSC", "leftColor": "green", "rightColor": "red", "d": 0.23, "ci": [0.00, 0.47], "y": 278},
          {"id": "row-10", "label": "PFC-RSC", "leftColor": "orange", "rightColor": "red", "d": 0.45, "ci": [0.19, 0.71], "y": 302}
        ]},
        "marks": [{"type": "confidenceIntervalSeries", "pointRadius": 3.6, "lineWidth": 1.2, "capHeight": 5}]
      }]
    };

    const colorOf = (spec, key) => spec.styleTokens[key] || key;

    function makeSvgEl(name, attrs = {}) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", name);
      for (const [key, value] of Object.entries(attrs)) {
        el.setAttribute(key, value);
      }
      return el;
    }

    function addText(svg, attrs, content) {
      const text = makeSvgEl("text", attrs);
      text.textContent = content;
      svg.appendChild(text);
      return text;
    }

    function xScale(plot, value) {
      const [d0, d1] = plot.axes.xAxis.domain;
      const line = plot.axes.xAxis.line;
      return line.x1 + ((value - d0) / (d1 - d0)) * (line.x2 - line.x1);
    }

    function renderSegmentedLabel(svg, spec, row) {
      const [left, right] = row.label.split("-");
      const base = {
        y: row.y + 5,
        "font-size": 14,
        "font-weight": 400,
        "data-row": row.id,
        "data-object": "row-label"
      };
      const leftText = addText(svg, {
        ...base,
        x: 8,
        fill: colorOf(spec, row.leftColor),
        "text-anchor": "start"
      }, left);
      const advance = Math.max(18, left.length * 7.6);
      addText(svg, {
        ...base,
        x: 8 + advance,
        fill: "#111",
        "text-anchor": "start"
      }, "-");
      addText(svg, {
        ...base,
        x: 8 + advance + 7,
        fill: colorOf(spec, row.rightColor),
        "text-anchor": "start"
      }, right);
      leftText.setAttribute("data-left-token", left);
    }

    function renderFigure(spec) {
      const panel = spec.panels[0];
      const plot = panel.plot;
      const rows = panel.data.effectSizes;
      const svg = makeSvgEl("svg", {
        viewBox: `0 0 ${spec.canvas.width} ${spec.canvas.height}`,
        role: "img",
        "aria-label": panel.title.text
      });

      svg.appendChild(makeSvgEl("rect", {
        x: 0, y: 0, width: spec.canvas.width, height: spec.canvas.height,
        fill: spec.canvas.background
      }));

      addText(svg, {
        id: panel.label.id,
        x: panel.label.x,
        y: panel.label.y,
        "font-size": panel.label.fontSize,
        "font-weight": panel.label.fontWeight,
        fill: "#000"
      }, panel.label.text);

      addText(svg, {
        id: panel.title.id,
        x: panel.title.x,
        y: panel.title.y,
        "font-size": panel.title.fontSize,
        "font-weight": panel.title.fontWeight,
        fill: "#111"
      }, panel.title.text);

      const zero = plot.axes.zeroLine.line;
      svg.appendChild(makeSvgEl("line", {
        id: plot.axes.zeroLine.id,
        x1: zero.x1,
        y1: zero.y1,
        x2: zero.x2,
        y2: zero.y2,
        stroke: spec.styleTokens.zeroLine,
        "stroke-width": 1,
        "stroke-dasharray": plot.axes.zeroLine.strokeDasharray
      }));

      const axis = plot.axes.xAxis.line;
      svg.appendChild(makeSvgEl("line", {
        id: plot.axes.xAxis.id,
        x1: axis.x1,
        y1: axis.y1,
        x2: axis.x2,
        y2: axis.y2,
        stroke: spec.styleTokens.axis,
        "stroke-width": 1
      }));

      for (const tick of plot.axes.xAxis.ticks) {
        const x = xScale(plot, tick.value);
        svg.appendChild(makeSvgEl("line", {
          x1: x,
          y1: axis.y1,
          x2: x,
          y2: axis.y1 + plot.axes.xAxis.tickLength,
          stroke: spec.styleTokens.axis,
          "stroke-width": 1,
          "data-axis": "x",
          "data-value": tick.value
        }));
        addText(svg, {
          x,
          y: axis.y1 + 19,
          "font-size": 14,
          fill: "#111",
          "text-anchor": "middle",
          "data-axis": "x",
          "data-value": tick.value
        }, tick.label);
      }

      const marker = panel.marks.find(d => d.type === "confidenceIntervalSeries");
      for (const row of rows) {
        renderSegmentedLabel(svg, spec, row);
        const color = colorOf(spec, row.rightColor);
        const x0 = xScale(plot, row.ci[0]);
        const x1 = xScale(plot, row.ci[1]);
        const xd = xScale(plot, row.d);
        svg.appendChild(makeSvgEl("line", {
          x1: x0,
          y1: row.y,
          x2: x1,
          y2: row.y,
          stroke: color,
          "stroke-width": marker.lineWidth,
          "data-row": row.id,
          "data-mark": "ci-line"
        }));
        for (const x of [x0, x1]) {
          svg.appendChild(makeSvgEl("line", {
            x1: x,
            y1: row.y - marker.capHeight / 2,
            x2: x,
            y2: row.y + marker.capHeight / 2,
            stroke: color,
            "stroke-width": marker.lineWidth,
            "data-row": row.id,
            "data-mark": "ci-cap"
          }));
        }
        svg.appendChild(makeSvgEl("circle", {
          cx: xd,
          cy: row.y,
          r: marker.pointRadius,
          fill: color,
          stroke: "none",
          "data-row": row.id,
          "data-mark": "effect-point"
        }));
        addText(svg, {
          x: 326,
          y: row.y + 5,
          "font-size": 14,
          fill: "#111",
          "text-anchor": "middle",
          "data-row": row.id,
          "data-column": "d"
        }, row.d.toFixed(2));
        const lo = row.ci[0].toFixed(2).replace("-", "\u2212");
        const hi = row.ci[1].toFixed(2).replace("-", "\u2212");
        addText(svg, {
          x: 382,
          y: row.y + 5,
          "font-size": 14,
          fill: "#111",
          "text-anchor": "middle",
          "data-row": row.id,
          "data-column": "ci"
        }, `[${lo}, ${hi}]`);
      }

      addText(svg, {
        x: 326,
        y: 72,
        "font-size": 14,
        "font-style": "italic",
        fill: "#111",
        "text-anchor": "middle",
        "data-object": "table-header"
      }, "d");
      addText(svg, {
        x: 382,
        y: 72,
        "font-size": 14,
        fill: "#111",
        "text-anchor": "middle",
        "data-object": "table-header"
      }, "95% CI");

      const candidate = document.getElementById("candidate");
      candidate.replaceChildren(svg);
    }

    async function loadSpec() {
      try {
        const response = await fetch("reference-07-cross-region-small-multiples-E.json");
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } catch (error) {
        if (fallbackSpec) return fallbackSpec;
        throw error;
      }
    }

    document.getElementById("qa-toggle").addEventListener("change", event => {
      document.getElementById("qa-reference").classList.toggle("visible", event.target.checked);
    });

    loadSpec().then(renderFigure).catch(error => {
      document.getElementById("candidate").textContent = `Unable to load JSON spec: ${error.message}`;
    });
  </script>
</body>
</html>
