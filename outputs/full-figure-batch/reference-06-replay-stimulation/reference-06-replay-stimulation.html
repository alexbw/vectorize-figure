<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>reference-06-replay-stimulation reconstruction</title>
  <style>
    html,body{margin:0;background:#eeeeee;color:#111;font-family:Arial,Helvetica,sans-serif}
    header{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:10px 14px;background:#fff;border-bottom:1px solid #ccc}
    h1{margin:0;font-size:16px}.note{font-size:12px;color:#555;margin-top:3px}
    .toggle{display:inline-flex;border:1px solid #999;border-radius:4px;overflow:hidden}.toggle button{border:0;background:#fff;padding:5px 10px;font:inherit;font-size:12px;cursor:pointer}.toggle .active{background:#111;color:#fff}
    main{min-height:calc(100vh - 49px);display:grid;place-items:center;padding:16px;box-sizing:border-box}
    .frame{position:relative;width:1536px;height:1024px;background:#fff;border:1px solid #d0d0d0;box-shadow:0 1px 5px rgba(0,0,0,.08);overflow:hidden}
    .surface,.reference{position:absolute;inset:0}.reference{display:none;width:100%;height:100%;object-fit:contain}.show-reference .surface{display:none}.show-reference .reference{display:block}
    canvas,svg{position:absolute;inset:0}
  </style>
</head>
<body>
  <header>
    <div><h1>reference-06-replay-stimulation</h1><div class="note">Generated candidate is rendered from JSON recipes. Source image is QA-only.</div></div>
    <div class="toggle"><button id="generatedButton" class="active" type="button">Generated</button><button id="referenceButton" type="button">Reference</button></div>
  </header>
  <main><div id="frame" class="frame"><div id="surface" class="surface"></div><img id="reference" class="reference" alt="QA reference source image"></div></main>
  <script>
    const SPEC_URL='./reference-06-replay-stimulation.json', NS='http://www.w3.org/2000/svg', $=id=>document.getElementById(id);
    const mk=(t,a={})=>{const n=document.createElementNS(NS,t);for(const[k,v]of Object.entries(a))if(v!==null&&v!==undefined)n.setAttribute(k,v);return n};
    const rng=s=>()=>{let t=s+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296};
    const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)), lerp=(d,r,v)=>r[0]+(v-d[0])/(d[1]-d[0])*(r[1]-r[0]);
    const xmap=(b,d,v)=>lerp(d,[b.x,b.x+b.width],v), ymap=(b,d,v)=>lerp(d,[b.y+b.height,b.y],v);
    function text(svg,s,d={}){const fs=s.fontSize||d.fontSize||14,lines=String(s.text||'').split('\n'),n=mk('text',{x:s.x,y:s.y,fill:s.fill||'#111','font-size':fs,'font-family':'Arial Narrow, Helvetica Neue Condensed, Arial, Helvetica, sans-serif','font-weight':s.fontWeight||400,'font-style':s.fontStyle||null,'text-anchor':s.anchor||'start',transform:s.rotation?`rotate(${s.rotation} ${s.x} ${s.y})`:null});lines.forEach((l,i)=>{const t=mk('tspan',{x:s.x,dy:i?fs*1.05:0});t.textContent=l;n.appendChild(t)});svg.appendChild(n);return n}
    function line(svg,a){svg.appendChild(mk('line',{x1:a.x1,y1:a.y1,x2:a.x2,y2:a.y2,stroke:a.stroke||'#111','stroke-width':a.w||1,'stroke-dasharray':a.dash||null,'stroke-linecap':a.cap||'butt'}))}
    function rect(svg,a){svg.appendChild(mk('rect',{x:a.x,y:a.y,width:a.width,height:a.height,fill:a.fill||'none',stroke:a.stroke||null,'stroke-width':a.w||null,'stroke-dasharray':a.dash||null,opacity:a.opacity||null}))}
    function circ(svg,a){svg.appendChild(mk('circle',{cx:a.x,cy:a.y,r:a.r||3,fill:a.fill||'#111',stroke:a.stroke||null,'stroke-width':a.w||null,opacity:a.opacity||1}))}
    function path(svg,d,a={}){svg.appendChild(mk('path',{d,fill:a.fill||'none',stroke:a.stroke||'#111','stroke-width':a.w||2,opacity:a.opacity||1,'stroke-linecap':'round','stroke-linejoin':'round','stroke-dasharray':a.dash||null}))}
    function axes(svg,b,x,y,o={}){line(svg,{x1:b.x,y1:b.y+b.height,x2:b.x+b.width,y2:b.y+b.height});line(svg,{x1:b.x,y1:b.y,x2:b.x,y2:b.y+b.height});(x.ticks||[]).forEach(t=>{const px=xmap(b,x.domain,t.value);line(svg,{x1:px,y1:b.y+b.height,x2:px,y2:b.y+b.height+5});text(svg,{text:t.label,x:px,y:b.y+b.height+21,fontSize:o.tickSize||12,anchor:'middle'})});(y.ticks||[]).forEach(t=>{const py=ymap(b,y.domain,t.value);line(svg,{x1:b.x-5,y1:py,x2:b.x,y2:py});text(svg,{text:t.label,x:b.x-8,y:py+4,fontSize:o.tickSize||12,anchor:'end'})});if(x.label)text(svg,x.label);if(y.label)text(svg,y.label);if(o.frame)rect(svg,{...b,stroke:'#111',w:1})}
    function rgb(a,b,t){return`rgb(${Math.round(a[0]+(b[0]-a[0])*t)},${Math.round(a[1]+(b[1]-a[1])*t)},${Math.round(a[2]+(b[2]-a[2])*t)})`}
    function heatColor(v){const t=clamp((v+3)/6,0,1);return t<.5?rgb([11,119,119],[247,243,232],t*2):rgb([247,243,232],[255,101,15],(t-.5)*2)}
    function grey(v){const g=Math.round(245-225*clamp(v,0,1));return`rgb(${g},${g},${g})`}
    function drawRaster(ctx,p){const b=p.plot.dataBbox, xd=p.plot.x.domain, yd=p.plot.y.domain;ctx.save();ctx.beginPath();ctx.rect(b.x,b.y,b.width,b.height);ctx.clip();p.marks.forEach(m=>{const r=rng(m.recipe.seed);ctx.fillStyle=m.color;ctx.globalAlpha=m.opacity;function dot(x,y,rr=m.markerRadius){ctx.beginPath();ctx.arc(xmap(b,xd,x),ymap(b,yd,y),rr,0,Math.PI*2);ctx.fill()}for(let i=0;i<m.recipe.backgroundCount;i++){dot(1+r()*199,m.recipe.rowDomain[0]+r()*(m.recipe.rowDomain[1]-m.recipe.rowDomain[0]),1.25)}m.recipe.bands.forEach(band=>{for(let i=0;i<band.count;i++){const t=r(),x=band.start[0]+(band.end[0]-band.start[0])*t+(r()-.5)*8.5,y=band.start[1]+(band.end[1]-band.start[1])*t+(r()-.5)*8;dot(x,y,1.4)}})});ctx.restore();ctx.globalAlpha=1}
    function drawHeat(ctx,h){const b=h.plotBox,r=rng(h.recipe.seed),img=ctx.createImageData(b.width,b.height);for(let yy=0;yy<b.height;yy++)for(let xx=0;xx<b.width;xx++){const x=1+xx/b.width*219,y=200-yy/b.height*199;let v=h.recipe.bias+(r()-.5)*.62;v+=h.recipe.diagonalStrength*Math.exp(-((x-y)**2)/(2*h.recipe.bandWidth*h.recipe.bandWidth));v+=.75*Math.exp(-((x-y-22)**2)/(2*15*15))*(h.id.endsWith('stim')?.8:.25);v-=.42*Math.exp(-((x-88)**2+(y-150)**2)/(2*28*28));const c=heatColor(v).match(/\d+/g).map(Number),i=(yy*b.width+xx)*4;img.data[i]=c[0];img.data[i+1]=c[1];img.data[i+2]=c[2];img.data[i+3]=255}ctx.putImageData(img,b.x,b.y)}
    function drawB(svg,ctx,p){p.heatmaps.forEach((h,i)=>{drawHeat(ctx,h);rect(svg,{...h.plotBox,stroke:'#111',w:1});text(svg,h.label);const yaxis={domain:h.domain.y,ticks:h.axes.y.ticks};const xaxis={domain:h.domain.x,ticks:h.axes.x.ticks||[],label:h.axes.x.label};axes(svg,h.plotBox,xaxis,yaxis,{tickSize:12});});text(svg,p.yLabel);const cb=p.colorbar.bbox;for(let i=0;i<cb.width;i++)rect(svg,{x:cb.x+i,y:cb.y,width:1,height:cb.height,fill:heatColor(-3+6*i/cb.width)});rect(svg,{...cb,stroke:'#111',w:1});text(svg,p.colorbar.title);p.colorbar.ticks.forEach(t=>{const x=xmap(cb,{0:-3,1:3}[0]?[0,1]:[-3,3],t.value);line(svg,{x1:x,y1:cb.y+cb.height,x2:x,y2:cb.y+cb.height+5});text(svg,{text:t.label,x,y:cb.y+cb.height+21,fontSize:12,anchor:'middle'})})}
    function posteriorD(b,xd,yd,peaks,base=.006){let d='';for(let i=0;i<180;i++){const x=xd[0]+(xd[1]-xd[0])*i/179;let y=base+.003*Math.sin(x*.16)+.002*Math.sin(x*.43);peaks.forEach(p=>y+=p.h*Math.exp(-((x-p.x)**2)/(2*p.w*p.w)));const px=xmap(b,xd,x),py=ymap(b,yd,clamp(y,0,yd[1]));d+=(i?'L':'M')+px.toFixed(1)+' '+py.toFixed(1)}return d}
    function drawC(svg,p){p.plots.forEach((pl,idx)=>{axes(svg,pl.plotBox,{domain:p.x.domain,ticks:idx?p.x.ticks:[]},{domain:p.y.domain,ticks:p.y.ticks},{tickSize:12});text(svg,pl.label);path(svg,posteriorD(pl.plotBox,p.x.domain,p.y.domain,pl.peaks),{stroke:pl.color,w:2});const r=rng(idx?6412:6411);for(let i=0;i<80;i++){const px=xmap(pl.plotBox,p.x.domain,r()*220);line(svg,{x1:px,y1:pl.plotBox.y+pl.plotBox.height+8,x2:px,y2:pl.plotBox.y+pl.plotBox.height+12,stroke:pl.color,w:1})}});text(svg,p.x.label);text(svg,p.y.label)}
    function curvePath(b,xd,yd,f,n=130){let d='';for(let i=0;i<n;i++){const x=xd[0]+(xd[1]-xd[0])*i/(n-1),px=xmap(b,xd,x),py=ymap(b,yd,f(x));d+=(i?'L':'M')+px.toFixed(1)+' '+py.toFixed(1)}return d}
    function band(svg,b,xd,yd,f,w,c){const a=[],bb=[];for(let i=0;i<120;i++){const x=xd[0]+(xd[1]-xd[0])*i/119;a.push([xmap(b,xd,x),ymap(b,yd,f(x)+w(x))]);bb.unshift([xmap(b,xd,x),ymap(b,yd,f(x)-w(x))])}path(svg,'M'+a.concat(bb).map(p=>p[0].toFixed(1)+' '+p[1].toFixed(1)).join('L')+'Z',{fill:c,stroke:'none',opacity:.22})}
    function drawD(svg,p){const b=p.plot.dataBbox,xd=p.plot.x.domain,yd=p.plot.y.domain;axes(svg,b,p.plot.x,p.plot.y,{tickSize:12});line(svg,{x1:xmap(b,xd,0),y1:b.y,x2:xmap(b,xd,0),y2:b.y+b.height,dash:'6 7'});line(svg,{x1:b.x,y1:ymap(b,yd,0),x2:b.x+b.width,y2:ymap(b,yd,0),dash:'2 5',stroke:'#555'});const pre=x=>-.05-.00028*(x+500)-.18*Math.exp(-((x-110)**2)/(2*65*65))-.11*Math.sin(x/44);const stim=x=>-.03+.72/(1+Math.exp(-(x-75)/48))-.00055*Math.max(0,x-210)+.06*Math.sin(x/38);band(svg,b,xd,yd,pre,x=>.07,'#0b7777');band(svg,b,xd,yd,stim,x=>.09,'#ff650f');path(svg,curvePath(b,xd,yd,pre),{stroke:'#0b7777',w:2.5});path(svg,curvePath(b,xd,yd,stim),{stroke:'#ff650f',w:2.5});p.series.forEach((s,i)=>{line(svg,{x1:1198,y1:79+i*23,x2:1218,y2:79+i*23,stroke:s.color,w:3});text(svg,{text:s.label,x:1225,y:83+i*23,fontSize:12})});text(svg,{text:'p < 0.001',x:1415,y:369,fontSize:13,fontStyle:'italic'});line(svg,{x1:1401,y1:380,x2:1498,y2:380,w:3})}
    function drawE(ctx,svg,p){const b=p.plot.dataBbox,yd=p.plot.y.domain;axes(svg,b,{domain:[0,1],ticks:[]},p.plot.y,{tickSize:12});line(svg,{x1:b.x,y1:ymap(b,yd,0),x2:b.x+b.width,y2:ymap(b,yd,0),stroke:'#555',dash:'5 5'});p.marks.forEach(m=>{const r=rng(m.seed);ctx.save();ctx.beginPath();ctx.rect(b.x,b.y,b.width,b.height);ctx.clip();ctx.globalAlpha=.55;ctx.fillStyle=m.color;for(let i=0;i<70;i++){const val=clamp(m.mean+(r()-.5)*.55+(r()-.5)*.22,-.95,.95),spread=30*Math.exp(-((val-m.mean)**2)/(2*.28*.28))+8,x=m.center+(r()-.5)*spread,y=ymap(b,yd,val);ctx.beginPath();ctx.arc(x,y,2.2,0,Math.PI*2);ctx.fill()}ctx.restore();const vals=[];for(let i=0;i<35;i++){const yy=-.85+i*1.7/34,w=6+36*Math.exp(-((yy-m.mean)**2)/(2*.27*.27));vals.push([m.center-w,ymap(b,yd,yy)]);vals.unshift([m.center+w,ymap(b,yd,yy)])}path(svg,'M'+vals.map(q=>q[0].toFixed(1)+' '+q[1].toFixed(1)).join('L')+'Z',{fill:m.color,stroke:m.color,opacity:.22,w:1});line(svg,{x1:m.center-14,y1:ymap(b,yd,m.mean),x2:m.center+14,y2:ymap(b,yd,m.mean),stroke:'#111',w:3})});p.plot.x.categories.forEach(c=>text(svg,{text:c.label,x:c.x,y:923,fontSize:14,fill:c.color,anchor:'middle'}));line(svg,{x1:148,y1:580,x2:272,y2:580});line(svg,{x1:148,y1:580,x2:148,y2:586});line(svg,{x1:272,y1:580,x2:272,y2:586});text(svg,{text:'p < 0.001',x:210,y:571,fontSize:14,fontStyle:'italic',anchor:'middle'})}
    function drawF(svg,p){const b=p.plot.dataBbox,xd=p.plot.x.domain,rowY=i=>575+i*17.8;line(svg,{x1:xmap(b,xd,0),y1:570,x2:xmap(b,xd,0),y2:894,stroke:'#555',dash:'6 7'});p.headers.forEach(h=>text(svg,h));p.rows.forEach((r,i)=>{const y=rowY(i+1);text(svg,{text:r.session,x:405,y:y+4,fontSize:14,anchor:'middle'});text(svg,{text:r.events,x:466,y:y+4,fontSize:14,anchor:'middle'});line(svg,{x1:xmap(b,xd,r.lo),y1:y,x2:xmap(b,xd,r.hi),y2:y,stroke:'#333'});line(svg,{x1:xmap(b,xd,r.lo),y1:y-3,x2:xmap(b,xd,r.lo),y2:y+3,stroke:'#333'});line(svg,{x1:xmap(b,xd,r.hi),y1:y-3,x2:xmap(b,xd,r.hi),y2:y+3,stroke:'#333'});circ(svg,{x:xmap(b,xd,r.d),y,r:4,fill:'#0b7777'})});line(svg,{x1:404,y1:894,x2:698,y2:894,stroke:'#777',dash:'5 5'});text(svg,{text:p.summary.label,x:389,y:914,fontSize:16});const sy=917,cx=xmap(b,xd,p.summary.d),lo=xmap(b,xd,p.summary.lo),hi=xmap(b,xd,p.summary.hi);path(svg,`M${lo} ${sy}L${cx} ${sy-6}L${hi} ${sy}L${cx} ${sy+6}Z`,{fill:'#111',stroke:'#111'});text(svg,{text:p.summary.text,x:674,y:927,fontSize:14});line(svg,{x1:b.x,y1:894,x2:b.x+b.width,y2:894});p.plot.x.ticks.forEach(t=>{const x=xmap(b,xd,t.value);line(svg,{x1:x,y1:894,x2:x,y2:901});text(svg,{text:t.label,x,y:918,fontSize:13,anchor:'middle'})});text(svg,p.plot.x.label)}
    function drawG(svg,p){const b=p.plot.dataBbox,xd=p.plot.x.domain,yd=p.plot.y.domain;axes(svg,b,p.plot.x,p.plot.y,{tickSize:12});line(svg,{x1:xmap(b,xd,0),y1:b.y,x2:xmap(b,xd,0),y2:b.y+b.height,stroke:'#555',dash:'6 7'});const logistic=(x,m,s)=>1/(1+Math.exp(-(x-m)/s));path(svg,curvePath(b,xd,yd,x=>logistic(x,-.22,.16)),{stroke:'#0b7777',w:2.3});path(svg,curvePath(b,xd,yd,x=>logistic(x,.30,.15)),{stroke:'#ff650f',w:2.3});p.legend.items.forEach((it,i)=>{line(svg,{x1:854,y1:563+i*23,x2:876,y2:563+i*23,stroke:it.color,w:3});text(svg,{text:it.label,x:884,y:568+i*23,fontSize:14,fill:it.color})});text(svg,p.annotations[1])}
    function drawH(svg,p){const b=p.plot.dataBbox,xd=p.plot.x.domain;line(svg,{x1:b.x,y1:b.y+b.height,x2:b.x+b.width,y2:b.y+b.height});line(svg,{x1:b.x,y1:b.y,x2:b.x,y2:b.y+b.height});p.plot.x.ticks.forEach(t=>{const x=xmap(b,xd,t.value);line(svg,{x1:x,y1:b.y+b.height,x2:x,y2:b.y+b.height+5});text(svg,{text:t.label,x,y:b.y+b.height+21,fontSize:12,anchor:'middle'})});line(svg,{x1:xmap(b,xd,0),y1:b.y,x2:xmap(b,xd,0),y2:b.y+b.height,stroke:'#555',dash:'6 7'});p.plot.categories.forEach(c=>text(svg,{text:c.label,x:1218,y:c.y+4,fontSize:14,anchor:'end'}));p.marks.forEach(m=>{const c=p.plot.categories.find(q=>q.id===m.category),y=c.y;[['pre','#0b7777',m.pre,m.preLo,m.preHi,-8],['stim','#ff650f',m.stim,m.stimLo,m.stimHi,8]].forEach(a=>{const yy=y+a[5];line(svg,{x1:xmap(b,xd,a[3]),y1:yy,x2:xmap(b,xd,a[4]),y2:yy,stroke:a[1]});line(svg,{x1:xmap(b,xd,a[3]),y1:yy-3,x2:xmap(b,xd,a[3]),y2:yy+3,stroke:a[1]});line(svg,{x1:xmap(b,xd,a[4]),y1:yy-3,x2:xmap(b,xd,a[4]),y2:yy+3,stroke:a[1]});rect(svg,{x:xmap(b,xd,a[2])-5,y:yy-5,width:10,height:10,fill:a[1]})})});text(svg,p.plot.x.label);line(svg,{x1:1230,y1:959,x2:1495,y2:959});text(svg,p.annotations[1]);p.legend.items.forEach((it,i)=>{rect(svg,{x:p.legend.x,y:p.legend.y+22*i,width:13,height:13,fill:it.color});text(svg,{text:it.label,x:p.legend.x+25,y:p.legend.y+12+22*i,fontSize:14})})}
    function render(spec){$('reference').src=spec.source.path;$('frame').style.width=spec.canvas.width+'px';$('frame').style.height=spec.canvas.height+'px';const surface=$('surface');surface.innerHTML='';const canvas=document.createElement('canvas');canvas.width=spec.canvas.width;canvas.height=spec.canvas.height;surface.appendChild(canvas);const ctx=canvas.getContext('2d'),svg=mk('svg',{viewBox:`0 0 ${spec.canvas.width} ${spec.canvas.height}`,width:spec.canvas.width,height:spec.canvas.height});surface.appendChild(svg);spec.panels.forEach(p=>{text(svg,p.label);text(svg,p.title);if(p.id==='A'){drawRaster(ctx,p);axes(svg,p.plot.dataBbox,p.plot.x,p.plot.y,{tickSize:12});line(svg,{x1:p.plot.dataBbox.x,y1:ymap(p.plot.dataBbox,p.plot.y.domain,p.plot.split.yValue),x2:p.plot.dataBbox.x+p.plot.dataBbox.width,y2:ymap(p.plot.dataBbox,p.plot.y.domain,p.plot.split.yValue),stroke:p.plot.split.stroke,dash:p.plot.split.dasharray});p.legend.items.forEach(it=>{circ(svg,{x:it.x,y:it.y,r:p.legend.markerRadius,fill:it.color});text(svg,{text:it.label,x:it.x+12,y:it.y+5,fontSize:14})});const cb=p.annotations[0].bbox;for(let i=0;i<cb.height;i++)rect(svg,{x:cb.x,y:cb.y+i,width:cb.width,height:1,fill:grey(1-i/cb.height)});rect(svg,{...cb,stroke:'#555',w:1});text(svg,p.annotations[0].title);p.annotations[0].ticks.forEach(t=>{const y=ymap(cb,[0,1],t.value);line(svg,{x1:cb.x+cb.width,y1:y,x2:cb.x+cb.width+5,y2:y,stroke:'#555'});text(svg,{text:t.label,x:cb.x+cb.width+8,y:y+4,fontSize:12})})}if(p.id==='B')drawB(svg,ctx,p);if(p.id==='C')drawC(svg,p);if(p.id==='D')drawD(svg,p);if(p.id==='E')drawE(ctx,svg,p);if(p.id==='F')drawF(svg,p);if(p.id==='G')drawG(svg,p);if(p.id==='H')drawH(svg,p)})}
    fetch(SPEC_URL).then(r=>r.json()).then(render);
    $('generatedButton').onclick=()=>{$('frame').classList.remove('show-reference');$('generatedButton').classList.add('active');$('referenceButton').classList.remove('active')};
    $('referenceButton').onclick=()=>{$('frame').classList.add('show-reference');$('referenceButton').classList.add('active');$('generatedButton').classList.remove('active')};
  </script>
</body>
</html>
