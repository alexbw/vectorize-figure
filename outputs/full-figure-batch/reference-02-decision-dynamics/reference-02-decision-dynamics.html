    function renderF(g,p){ const m=axis(g,p.plot,p.xTicks,p.yTicks,'Reaction time (ms)','Probability density'); ['left','right'].forEach(name=>{const rec=p.recipes[name], rr=rng(rec.seed), bins=[]; for(let i=0;i<56;i++){const x=map(i,[0,55],[170,1120]); const y=Math.exp(-Math.pow((x-(name==='left'?560:635))/190,2))*.0065*(.82+rr()*.35); bins.push([x,y]);} const d=bins.map((q,i)=>`${i?'L':'M'} ${m.x(q[0])} ${m.y(q[1])}`).join(' ')+` L ${m.x(1120)} ${m.y(0)} L ${m.x(170)} ${m.y(0)} Z`; add(g,'path',{d,fill:name==='left'?'rgba(0,72,199,.18)':'rgba(240,20,20,.13)',stroke:rec.color,'stroke-width':1.5}); add(g,'line',{x1:m.x(rec.median),y1:p.plot.y,x2:m.x(rec.median),y2:p.plot.y+p.plot.height,stroke:rec.color,'stroke-dasharray':'5 3'});}); txt(g,'Median RT (ms)\nLeft: 512\nRight: 525',80,98,{size:12,fill:'#0048c7'}); add(g,'line',{x1:245,y1:95,x2:265,y2:95,stroke:'#0048c7','stroke-width':2}); txt(g,'Left choice',270,99,{size:13}); add(g,'line',{x1:245,y1:123,x2:265,y2:123,stroke:'#f01414','stroke-width':2}); txt(g,'Right choice',270,127,{size:13}); }
    function renderG(g,p){ const m=axis(g,p.plot,p.xTicks,p.yTicks,'PC 1 (25%)','PC 2 (12%)'); add(g,'line',{x1:p.plot.x,y1:m.y(0),x2:p.plot.x+p.plot.width,y2:m.y(0),stroke:'#777','stroke-dasharray':'5 4'}); add(g,'line',{x1:m.x(0),y1:p.plot.y,x2:m.x(0),y2:p.plot.y+p.plot.height,stroke:'#777','stroke-dasharray':'5 4'}); [p.left,p.right].forEach((arr,idx)=>{for(let j=0;j<15;j++){const rr=rng(700+j+idx*80); add(g,'path',{d:arr.map((q,i)=>`${i?'L':'M'} ${m.x(q[0]+(rr()-.5)*.18)} ${m.y(q[1]+(rr()-.5)*.18)}`).join(' '),fill:'none',stroke:idx?'#f01414':'#0048c7','stroke-opacity':.15});} add(g,'path',{d:arr.map((q,i)=>`${i?'L':'M'} ${m.x(q[0])} ${m.y(q[1])}`).join(' '),fill:'none',stroke:idx?'#f01414':'#0048c7','stroke-width':3}); arr.forEach((q,i)=>{if(i%2===0)add(g,'circle',{cx:m.x(q[0]),cy:m.y(q[1]),r:4,fill:'#111'});});}); add(g,'line',{x1:184,y1:78,x2:204,y2:78,stroke:'#0048c7','stroke-width':2});txt(g,'Left choice (n = 142)',212,82,{size:12});add(g,'line',{x1:184,y1:101,x2:204,y2:101,stroke:'#f01414','stroke-width':2});txt(g,'Right choice (n = 138)',212,105,{size:12});add(g,'circle',{cx:194,cy:124,r:5,fill:'#111'});txt(g,'Time points',212,128,{size:12});txt(g,'Stim\n(0 ms)',64,250,{size:13,anchor:'middle'});txt(g,'500 ms',167,197,{size:12});txt(g,'Go',323,199,{size:13});txt(g,'Outcome',300,364,{size:13}); }
    function renderH(g,p){ p.plots.forEach(pl=>{const b=pl.box, m={y:v=>map(v,pl.yDomain,[b.y+b.height,b.y])}; txt(g,pl.title,b.x+b.width/2,b.y-35,{size:14,anchor:'middle'}); add(g,'line',{x1:b.x,y1:b.y+b.height,x2:b.x+b.width,y2:b.y+b.height,stroke:'#111','stroke-width':1.5}); add(g,'line',{x1:b.x,y1:b.y,x2:b.x,y2:b.y+b.height,stroke:'#111','stroke-width':1.5}); pl.yTicks.forEach(v=>{add(g,'line',{x1:b.x-5,y1:m.y(v),x2:b.x,y2:m.y(v),stroke:'#111'});txt(g,String(v),b.x-9,m.y(v)+4,{size:13,anchor:'end'});}); const x1=b.x+38,x2=b.x+b.width-38; pl.values.forEach(v=>{add(g,'line',{x1,y1:m.y(v[0]),x2,y2:m.y(v[1]),stroke:'#999'});add(g,'circle',{cx:x1,cy:m.y(v[0]),r:3.5,fill:'#0048c7'});add(g,'circle',{cx:x2,cy:m.y(v[1]),r:3.5,fill:'#f01414'});}); add(g,'path',{d:`M ${x1} ${b.y+11} v -12 h ${x2-x1} v 12`,fill:'none',stroke:'#111'}); txt(g,'n.s.',(x1+x2)/2,b.y-15,{size:13,anchor:'middle'}); txt(g,pl.leftLabel,x1,b.y+b.height+34,{size:14,fill:'#0048c7',anchor:'middle'}); txt(g,pl.rightLabel,x2,b.y+b.height+34,{size:14,fill:'#f01414',anchor:'middle'}); }); txt(g,p.caption,195,478,{size:14,anchor:'middle',style:'italic'}); }
    function render(spec) {
      const frame=el('frame'), surface=el('surface'); frame.style.width=spec.canvas.width+'px'; frame.style.height=spec.canvas.height+'px'; surface.innerHTML='';
      const canvas=document.createElement('canvas'); canvas.width=spec.canvas.width; canvas.height=spec.canvas.height; surface.appendChild(canvas); const ctx=canvas.getContext('2d'); ctx.fillStyle=spec.canvas.background; ctx.fillRect(0,0,canvas.width,canvas.height);
      const svg=s('svg',{width:spec.canvas.width,height:spec.canvas.height,viewBox:`0 0 ${spec.canvas.width} ${spec.canvas.height}`}); surface.appendChild(svg);
      add(svg,'rect',{x:0,y:0,width:spec.canvas.width,height:spec.canvas.height,fill:'none',stroke:'#111','stroke-width':3});
      [[430,0,430,1024],[786,0,786,1024],[1146,0,1146,1024],[0,512,1536,512]].forEach(l=>add(svg,'line',{x1:l[0],y1:l[1],x2:l[2],y2:l[3],stroke:'#111','stroke-width':1.5}));
      spec.panels.forEach(p=>{const g=panelBase(svg,p); if(p.id==='A')renderA(g,p); if(p.id==='B')renderB(g,p); if(p.id==='C')renderHeat(ctx,g,p); if(p.id==='D')renderPsych(g,p); if(p.id==='E')renderE(g,p); if(p.id==='F')renderF(g,p); if(p.id==='G')renderG(g,p); if(p.id==='H')renderH(g,p);});
      el('reference').src = spec.source.path; el('doc-title').textContent = spec.id;
    }
    fetch(SPEC_URL).then(r => r.json()).then(render);
    el('generated-button').onclick = () => { el('frame').classList.remove('show-reference'); el('generated-button').classList.add('active'); el('reference-button').classList.remove('active'); };
    el('reference-button').onclick = () => { el('frame').classList.add('show-reference'); el('reference-button').classList.add('active'); el('generated-button').classList.remove('active'); };
  </script>
