    function panelG(svg,p){axes(svg,p.plotBox,p.x,p.y);let d='';for(let i=1;i<=50;i++){const y=Math.log10(8/(i**1.8)+.001),x=lerp(p.x.domain,[p.plotBox.x,p.plotBox.x+p.plotBox.width],i),py=lerp(p.y.domain,[p.plotBox.y+p.plotBox.height,p.plotBox.y],y);d+=(i===1?'M':'L')+x+' '+py;circ(svg,{x,y:py,r:2.7,fill:'#111'})}path(svg,d,{stroke:'#111',w:1});p.annotations.forEach(a=>{const x=lerp(p.x.domain,[p.plotBox.x,p.plotBox.x+p.plotBox.width],a.xValue);line(svg,{x1:x,y1:p.plotBox.y,x2:x,y2:p.plotBox.y+p.plotBox.height,stroke:'#9b4cc2',dash:'6 5'});text(svg,{text:a.label,x:x+4,y:p.plotBox.y+30,fontSize:12,fill:'#7c2cc2'})})}
    function panelH(svg,p,cols){const ids=['pca10','pca20','pls','lda'];p.plots.forEach((pl,i)=>{const b={x:pl.x,y:pl.y,width:p.plot.width,height:p.plot.height};text(svg,{text:pl.title,x:b.x+b.width/2,y:b.y-10,fontSize:12,anchor:'middle'});[-.6,0,.6].forEach(xx=>rect(svg,{x:lerp(p.x.domain,[b.x,b.x+b.width],xx),y:b.y,width:18,height:b.height,fill:'rgba(0,0,0,.055)'}));axes(svg,b,p.x,p.y,{frame:false});line(svg,{x1:lerp(p.x.domain,[b.x,b.x+b.width],0),y1:b.y,x2:lerp(p.x.domain,[b.x,b.x+b.width],0),y2:b.y+b.height,stroke:'#111'});const f=x=>-.45-i*.35-1.15*Math.exp(-((x-.18)**2)/(2*.18*.18))+.25*Math.sin((x+i)*4);band(svg,b,p.x.domain,p.y.domain,f,.12,cols[ids[i]]+'33');path(svg,curveD(b,p.x.domain,p.y.domain,f),{stroke:cols[ids[i]],w:2})});text(svg,{text:p.x.label,x:635,y:940,fontSize:13,anchor:'middle'});text(svg,{text:p.y.label,x:374,y:837,fontSize:13,anchor:'middle',rotation:-90});p.phaseLegend.items.forEach((it,i)=>{rect(svg,{x:p.phaseLegend.x,y:p.phaseLegend.y+i*25,width:20,height:18,fill:`rgba(0,0,0,${.05+i*.05})`,stroke:'#111'});text(svg,{text:it,x:p.phaseLegend.x+28,y:p.phaseLegend.y+14+i*25,fontSize:12})})}
    function panelI(svg,p,cols){p.plots.forEach(pl=>{const b={x:pl.x,y:pl.y,width:pl.width,height:pl.height};text(svg,{text:pl.title,x:b.x+b.width/2,y:b.y-26,fontSize:12,anchor:'middle'});axes(svg,b,{domain:[0,6],ticks:[]},{domain:pl.domain,ticks:pl.ticks,labels:pl.labels});p.series.forEach((s,i)=>{const x=b.x+18+i*16,c=cols[s.id],base={peak:[60,72,70,74,76],time:[-.28,.42,-.15,.02,-.25],resid:[-.1,-.35,-.2,-1.25,-2.0],dim:[34,35,21,17,9]}[pl.id][i],spread={peak:18,time:.18,resid:.55,dim:5}[pl.id];const vals=[-1.1,-.6,-.2,.2,.65,1.0].map(q=>base+q*spread),ym=v=>lerp(pl.domain,[b.y+b.height,b.y],v);rect(svg,{x:x-5,y:ym(vals[4]),width:10,height:ym(vals[1])-ym(vals[4]),fill:c+'44',stroke:c,w:1});line(svg,{x1:x-6,y1:ym(vals[3]),x2:x+6,y2:ym(vals[3]),stroke:c,w:2});line(svg,{x1:x,y1:ym(vals[0]),x2:x,y2:ym(vals[5]),stroke:c});vals.forEach((v,j)=>circ(svg,{x:x+(j%2?3:-3),y:ym(v),r:2,fill:'#fff',stroke:c,w:1}))})});rect(svg,p.legend);p.series.forEach((s,i)=>{const x=p.legend.x+12+i*92;rect(svg,{x,y:p.legend.y+12,width:13,height:13,fill:cols[s.id],stroke:'#111',w:.5});text(svg,{text:s.label,x:x+22,y:p.legend.y+23,fontSize:12})})}
    fetch(SPEC_URL).then(r=>r.json()).then(render);
    $('generatedButton').onclick=()=>{$('frame').classList.remove('show-reference');$('generatedButton').classList.add('active');$('referenceButton').classList.remove('active')};
    $('referenceButton').onclick=()=>{$('frame').classList.add('show-reference');$('referenceButton').classList.add('active');$('generatedButton').classList.remove('active')};
  </script>
