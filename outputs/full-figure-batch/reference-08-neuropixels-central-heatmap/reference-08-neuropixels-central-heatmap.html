<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>reference-08-neuropixels-central-heatmap reconstruction</title>
  <style>
    html,body{margin:0;background:#eee;color:#111;font-family:Arial,Helvetica,sans-serif}
    header{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:10px 14px;background:#fff;border-bottom:1px solid #ccc}
    h1{margin:0;font-size:16px}.note{font-size:12px;color:#555;margin-top:3px}
    .toggle{display:inline-flex;border:1px solid #999;border-radius:4px;overflow:hidden}.toggle button{border:0;background:#fff;padding:5px 10px;font:inherit;font-size:12px;cursor:pointer}.toggle .active{background:#111;color:#fff}
    main{min-height:calc(100vh - 50px);display:grid;place-items:center;padding:16px;box-sizing:border-box}
    .frame{position:relative;width:1536px;height:1024px;background:#fff;border:1px solid #d0d0d0;box-shadow:0 1px 5px rgba(0,0,0,.08);overflow:hidden}
    .surface,.reference{position:absolute;inset:0}.reference{display:none;width:100%;height:100%;object-fit:contain;background:#fff}.show-reference .surface{display:none}.show-reference .reference{display:block}

<body>
  <header>
    <div><h1>reference-08-neuropixels-central-heatmap</h1><div class="note">Generated candidate is rendered from JSON. Source image is QA-only.</div></div>
    <div class="toggle"><button id="generatedButton" class="active" type="button">Generated</button><button id="referenceButton" type="button">Reference</button></div>
  </header>
  <main><div id="frame" class="frame"><div id="surface" class="surface"></div><img id="reference" class="reference" alt="QA reference source image"></div></main>
  <script>
    const SPEC_URL='./reference-08-neuropixels-central-heatmap.json',NS='http://www.w3.org/2000/svg',$=id=>document.getElementById(id);
    const mk=(t,a={})=>{const n=document.createElementNS(NS,t);for(const[k,v]of Object.entries(a))if(v!==null&&v!==undefined)n.setAttribute(k,v);return n};
    const rng=s=>()=>{let t=s+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296};
    const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),lerp=(d,r,v)=>r[0]+(v-d[0])/(d[1]-d[0])*(r[1]-r[0]);
    function hex(c){c=c.replace('#','');return[parseInt(c.slice(0,2),16),parseInt(c.slice(2,4),16),parseInt(c.slice(4,6),16)]}
    function mix(a,b,t){return`rgb(${Math.round(a[0]+(b[0]-a[0])*t)},${Math.round(a[1]+(b[1]-a[1])*t)},${Math.round(a[2]+(b[2]-a[2])*t)})`}
    function color(stops,v){if(v<=stops[0].value)return stops[0].color;for(let i=1;i<stops.length;i++)if(v<=stops[i].value){const a=stops[i-1],b=stops[i],t=(v-a.value)/(b.value-a.value);return mix(hex(a.color),hex(b.color),t)}return stops[stops.length-1].color}
    function text(svg,s,d={}){if(!s)return;const fs=s.fontSize||d.fontSize||13,n=mk('text',{x:s.x,y:s.y,fill:s.fill||d.fill||'#111','font-size':fs,'font-family':'Arial, Helvetica, sans-serif','font-weight':s.fontWeight||400,'text-anchor':s.anchor||'start',transform:s.rotation?`rotate(${s.rotation} ${s.x} ${s.y})`:null});String(s.text||'').split('\n').forEach((l,i)=>{const t=mk('tspan',{x:s.x,dy:i?fs*1.08:0});t.textContent=l;n.appendChild(t)});svg.appendChild(n)}
    function line(svg,a){svg.appendChild(mk('line',{x1:a.x1,y1:a.y1,x2:a.x2,y2:a.y2,stroke:a.stroke||'#111','stroke-width':a.w||1,'stroke-dasharray':a.dash||null,'stroke-linecap':a.cap||'butt'}))}
    function rect(svg,a){svg.appendChild(mk('rect',{x:a.x,y:a.y,width:a.width,height:a.height,fill:a.fill||'none',stroke:a.stroke||null,'stroke-width':a.w||null,'stroke-dasharray':a.dash||null,opacity:a.opacity||null}))}
    function circ(svg,a){svg.appendChild(mk('circle',{cx:a.x,cy:a.y,r:a.r||3,fill:a.fill||'#111',stroke:a.stroke||null,'stroke-width':a.w||null,opacity:a.opacity||null}))}
    function path(svg,d,a={}){svg.appendChild(mk('path',{d,fill:a.fill||'none',stroke:a.stroke||'#111','stroke-width':a.w||2,opacity:a.opacity||null,'stroke-linecap':'round','stroke-linejoin':'round','stroke-dasharray':a.dash||null}))}
    function xmap(b,x,v){return lerp(x.domain,[b.x,b.x+b.width],v)} function ymap(b,y,v){return lerp(y.domain,[b.y+b.height,b.y],v)}
    function axes(svg,b,x,y,o={}){line(svg,{x1:b.x,y1:b.y+b.height,x2:b.x+b.width,y2:b.y+b.height});line(svg,{x1:b.x,y1:b.y,x2:b.x,y2:b.y+b.height});(x.ticks||[]).forEach(t=>{const px=xmap(b,x,t.value);line(svg,{x1:px,y1:b.y+b.height,x2:px,y2:b.y+b.height+6});if(t.label!==undefined)text(svg,{text:t.label,x:px,y:b.y+b.height+22,fontSize:13,anchor:'middle'})});(y.ticks||[]).forEach(t=>{const py=ymap(b,y,t.value);line(svg,{x1:b.x-6,y1:py,x2:b.x,y2:py});if(t.label!==undefined)text(svg,{text:t.label,x:b.x-9,y:py+4,fontSize:13,anchor:'end'})});if(x.label)text(svg,{text:x.label,x:b.x+b.width/2,y:b.y+b.height+(o.xLabelOffset||46),fontSize:14,anchor:'middle'});if(y.label)text(svg,{text:y.label,x:b.x-(o.yLabelOffset||46),y:b.y+b.height/2,fontSize:14,anchor:'middle',rotation:-90})}
    function curve(svg,b,x,y,f,a={}){let d='';for(let i=0;i<160;i++){const xv=x.domain[0]+(x.domain[1]-x.domain[0])*i/159;d+=(i?'L':'M')+xmap(b,x,xv).toFixed(1)+' '+ymap(b,y,f(xv)).toFixed(1)}path(svg,d,a)}
    function band(svg,b,x,y,f,w,fill){let top=[],bot=[];for(let i=0;i<140;i++){const xv=x.domain[0]+(x.domain[1]-x.domain[0])*i/139;top.push([xmap(b,x,xv),ymap(b,y,f(xv)+w)]);bot.unshift([xmap(b,x,xv),ymap(b,y,f(xv)-w)])}path(svg,'M'+top.concat(bot).map(p=>p[0].toFixed(1)+' '+p[1].toFixed(1)).join('L')+'Z',{fill,stroke:'none'})}
    function colorbar(svg,cb,scale,titleLeft=false){for(let i=0;i<cb.height;i++){const v=lerp([0,cb.height],scale.domain,i);rect(svg,{x:cb.x,y:cb.y+cb.height-1-i,width:cb.width,height:1,fill:color(scale.stops,v)})}rect(svg,{...cb,stroke:'#111',w:1});(cb.ticks||[]).forEach(t=>{const y=lerp(scale.domain,[cb.y+cb.height,cb.y],t.value);line(svg,{x1:cb.x+cb.width,y1:y,x2:cb.x+cb.width+5,y2:y});text(svg,{text:t.label,x:cb.x+cb.width+8,y:y+4,fontSize:12})});text(svg,{text:cb.label,x:titleLeft?cb.x-6:cb.x-8,y:cb.y-13,fontSize:12,anchor:titleLeft?'end':'start'})}
    function drawField(ctx,b,scale,seed,kind){const r=rng(seed),img=ctx.createImageData(b.width,b.height);for(let yy=0;yy<b.height;yy++)for(let xx=0;xx<b.width;xx++){const x=xx/b.width,y=yy/b.height;let v=0;if(kind==='activity'){v=(r()-.5)*.75-.15;for(let k=0;k<9;k++){const cx=(.18+k*.145)%1,cy=(k*.137+.08)%1,w=.018+.012*(k%3),amp=k%2?1.7:-1.4;v+=amp*Math.exp(-((x-cx)**2)/(2*w*w))*Math.exp(-((y-cy)**2)/(2*.045*.045))}v+=.9*Math.sin(y*24+x*9)+.25*Math.sin(y*90)}else{const d=Math.abs(x-y);v=.15*Math.exp(-d*d/(2*.012))+0.035*Math.exp(-d*d/(2*.05))+(r()-.5)*.014;v+=0.025*Math.exp(-((x-.72)**2+(y-.66)**2)/(2*.035))}const c=color(scale.stops,clamp(v,scale.domain[0],scale.domain[1])).match(/\d+/g).map(Number),i=(yy*b.width+xx)*4;img.data[i]=c[0];img.data[i+1]=c[1];img.data[i+2]=c[2];img.data[i+3]=255}ctx.putImageData(img,b.x,b.y)}
    function render(spec){const frame=$('frame'),surface=$('surface');frame.style.width=spec.canvas.width+'px';frame.style.height=spec.canvas.height+'px';$('reference').src=spec.source.path;surface.innerHTML='';const canvas=document.createElement('canvas');canvas.width=spec.canvas.width;canvas.height=spec.canvas.height;surface.appendChild(canvas);const ctx=canvas.getContext('2d'),svg=mk('svg',{viewBox:`0 0 ${spec.canvas.width} ${spec.canvas.height}`,width:spec.canvas.width,height:spec.canvas.height});surface.appendChild(svg);spec.panels.forEach(p=>{text(svg,p.label);text(svg,p.title);({A:panelA,B:panelB,C:panelC,D:panelD,E:panelE,F:panelF,G:panelG,H:panelH})[p.id](ctx,svg,p,spec)})}
    function panelA(ctx,svg,p){const b=p.plot.dataBbox,x=p.plot.x,yl=p.plot.yLeft,yr=p.plot.yRight;p.plot.phaseBands.forEach(s=>rect(svg,{x:xmap(b,x,s.from),y:b.y,width:xmap(b,x,s.to)-xmap(b,x,s.from),height:b.height,fill:'#eee',opacity:.75}));axes(svg,b,x,yl,{yLabelOffset:54});line(svg,{x1:b.x+b.width,y1:b.y,x2:b.x+b.width,y2:b.y+b.height,stroke:'#f28a00'});yr.ticks.forEach(t=>{const py=ymap(b,yr,t.value);line(svg,{x1:b.x+b.width,y1:py,x2:b.x+b.width+6,y2:py,stroke:'#f28a00'});text(svg,{text:t.label,x:b.x+b.width+12,y:py+4,fontSize:13,fill:'#f28a00'})});text(svg,{text:yr.label,x:b.x+b.width+47,y:b.y+b.height/2,fontSize:14,fill:'#f28a00',rotation:90,anchor:'middle'});curve(svg,b,x,yl,t=>140+82*Math.sin((t-8)/19)+58*Math.sin((t-3)/8)+30*Math.sin(t/4),{stroke:'#006c6d',w:2});curve(svg,b,x,yr,t=>10+2.8*Math.sin(t*.9)+2.5*Math.sin(t*2.3)+18*Math.max(0,Math.sin((t-145)/7))**10,{stroke:'#f28a00',w:1.4});const tr=p.track;line(svg,{x1:tr.x,y1:tr.y,x2:tr.x+tr.width,y2:tr.y,stroke:'#111',w:2});tr.ticks.forEach(t=>{const px=lerp([0,300],[tr.x,tr.x+tr.width],t.value);line(svg,{x1:px,y1:tr.y-7,x2:px,y2:tr.y+8});text(svg,{text:t.label,x:px,y:tr.y+27,fontSize:14,anchor:'middle'})});circ(svg,{...tr.start,fill:'#888',stroke:'#555'});circ(svg,{...tr.goal,fill:'#76c9c4',stroke:'#111'});text(svg,{text:tr.start.label,x:45,y:55,fontSize:14});text(svg,{text:tr.goal.label,x:349,y:55,fontSize:14})}
    function panelB(ctx,svg,p){const b=p.plot.dataBbox,x=p.plot.x,y=p.plot.y,r=rng(8082);for(let row=1;row<=200;row++){let n=1+Math.floor(r()*4);p.plot.marks[0].bursts.forEach(bu=>{if(r()<.18)n+=Math.floor(3+r()*7)});for(let j=0;j<n;j++){let t=100+r()*40;if(r()<.55){const bu=p.plot.marks[0].bursts[Math.floor(r()*p.plot.marks[0].bursts.length)];t=bu+(r()-.5)*3.8}circ(svg,{x:xmap(b,x,t),y:ymap(b,y,row),r:.75,fill:'#111',opacity:.9})}}axes(svg,b,x,y,{yLabelOffset:52});p.schematic.labels.forEach(l=>text(svg,{...l,fontSize:12}));const pr=p.schematic.probe;rect(svg,{x:pr.x,y:pr.y,width:pr.width,height:pr.height,fill:'#eee',stroke:'#111'});pr.segments.forEach(s=>rect(svg,{x:pr.x+1,y:s.y,width:pr.width-2,height:s.height,fill:s.fill}));path(svg,`M${pr.x} ${pr.y+pr.height}L${pr.x+pr.width/2} ${pr.y+pr.height+12}L${pr.x+pr.width} ${pr.y+pr.height}Z`,{fill:'#ddd',stroke:'#111',w:1});[620,645,670,695].forEach((yy,i)=>line(svg,{x1:58,y1:yy,x2:107,y2:602+i*31,stroke:'#888',dash:'4 3'}));const br=p.schematic.brain;path(svg,'M246 683 C235 650 268 619 317 617 C356 615 390 636 384 671 C380 703 337 724 291 719 C263 717 251 705 246 683 Z',{fill:'#dbeae8',stroke:'#111',w:1.2});path(svg,'M265 691 C280 651 345 638 367 671 C354 641 296 635 267 671 C255 686 254 704 270 712',{stroke:'#111',w:1.1,fill:'none'});path(svg,'M289 704 C304 672 348 667 360 692 C341 675 306 679 294 711',{stroke:'#111',w:1.1,fill:'none'});path(svg,'M314 700 C322 684 343 682 349 698 C336 690 324 692 318 707',{stroke:'#f28a00',w:3.5,fill:'none'});path(svg,'M339 556 L339 704',{stroke:'#111',w:3});rect(svg,{x:323,y:554,width:5,height:152,fill:'#999',stroke:'#111'})}
    function panelC(ctx,svg,p,spec){const b=p.plot.dataBbox,x=p.plot.x,y=p.plot.y;drawField(ctx,b,spec.colorScales.zscoreTealGold,p.plot.marks[0].seed,'activity');rect(svg,{...b,stroke:'#111',w:1});axes(svg,b,x,y,{yLabelOffset:56});p.plot.eventLines.forEach(v=>line(svg,{x1:xmap(b,x,v),y1:b.y,x2:xmap(b,x,v),y2:b.y+b.height,stroke:'#fff',w:1.5,dash:'8 7'}));const rs=p.plot.regionStrip;rect(svg,{x:rs.x,y:rs.y,width:rs.width,height:rs.height,fill:'#49aaa6',stroke:'#111'});rect(svg,{x:rs.x,y:rs.y+rs.height*.75,width:rs.width,height:rs.height*.25,fill:'#f28a00'});const hs=p.plot.helperStrip;line(svg,{x1:hs.x,y1:hs.y,x2:hs.x+hs.width,y2:hs.y,stroke:'#006c6d',w:2});hs.ticks.forEach(t=>{const px=lerp(hs.domain,[hs.x,hs.x+hs.width],t.value);line(svg,{x1:px,y1:hs.y,x2:px,y2:hs.y+6,stroke:'#006c6d'});text(svg,{text:t.label,x:px,y:hs.y+25,fontSize:14,fill:'#006c6d',anchor:'middle'})});text(svg,{text:hs.label,x:hs.x+hs.width/2,y:hs.y+46,fontSize:14,fill:'#006c6d',anchor:'middle'});colorbar(svg,p.plot.colorbar,spec.colorScales.zscoreTealGold,true)}
    function panelD(ctx,svg,p){const b=p.plot.dataBbox,x=p.plot.x,y=p.plot.y;p.plot.phaseBands.forEach(s=>rect(svg,{x:xmap(b,x,s.from),y:b.y,width:xmap(b,x,s.to)-xmap(b,x,s.from),height:b.height,fill:'#eee',opacity:.8}));axes(svg,b,x,y,{yLabelOffset:44});const f=t=>.33+.42*(t/220)+.18*Math.sin(t/17)-.13*Math.sin(t/7);band(svg,b,x,y,f,.055,'#49aaa666');curve(svg,b,x,y,f,{stroke:'#006c6d',w:2});curve(svg,b,x,y,t=>.2+.01*Math.sin(t/9),{stroke:'#888',w:1.6,dash:'5 4'});p.plot.annotations.forEach(a=>text(svg,{...a,fontSize:14}))}
    function panelE(ctx,svg,p,spec){const b=p.plot.dataBbox,x=p.plot.x,y=p.plot.y;axes(svg,b,x,y);let pts=[];for(let i=0;i<160;i++){const t=i/159*2*Math.PI,rad=1.0+.35*Math.sin(t*2.2),xx=.75+2.35*Math.cos(t)+.42*Math.sin(t*3),yy=.05+1.45*Math.sin(t)-.28*Math.cos(t*2);pts.push([xx,yy,i/159*300])}for(let i=1;i<pts.length;i++)path(svg,`M${xmap(b,x,pts[i-1][0])} ${ymap(b,y,pts[i-1][1])}L${xmap(b,x,pts[i][0])} ${ymap(b,y,pts[i][1])}`,{stroke:color(spec.colorScales.positionViridis.stops,pts[i][2]),w:3});const a=p.plot.arrow;line(svg,{x1:xmap(b,x,a.from[0]),y1:ymap(b,y,a.from[1]),x2:xmap(b,x,a.to[0]),y2:ymap(b,y,a.to[1]),stroke:'#111',w:1.4});path(svg,`M${xmap(b,x,a.to[0])} ${ymap(b,y,a.to[1])}l-9 -5l3 10Z`,{fill:'#111',stroke:'#111',w:1});colorbar(svg,p.plot.colorbar,spec.colorScales.positionViridis)}
    function panelF(ctx,svg,p){const b=p.plot.dataBbox,y=p.plot.y;axes(svg,b,{domain:[0,1],ticks:[],label:null},y,{yLabelOffset:46});line(svg,{x1:p.plot.separatorX,y1:b.y+26,x2:p.plot.separatorX,y2:b.y+b.height+10,stroke:'#888',dash:'5 4'});const cats=Object.fromEntries(p.plot.xCategories.map(c=>[c.id,c]));p.plot.points.forEach(pt=>{const c=cats[pt.category],py=ymap(b,y,pt.mean),e1=ymap(b,y,pt.mean+pt.sem),e0=ymap(b,y,pt.mean-pt.sem);line(svg,{x1:c.x-20,y1:py,x2:c.x+20,y2:py,stroke:c.fill});line(svg,{x1:c.x,y1:e0,x2:c.x,y2:e1,stroke:c.fill});line(svg,{x1:c.x-5,y1:e0,x2:c.x+5,y2:e0,stroke:c.fill});line(svg,{x1:c.x-5,y1:e1,x2:c.x+5,y2:e1,stroke:c.fill});circ(svg,{x:c.x,y:py,r:5.5,fill:c.fill,stroke:'#111',w:.6});text(svg,{text:c.id,x:c.x,y:b.y+b.height+20,fontSize:14,fill:c.fill,anchor:'middle'})});p.plot.groupLabels.forEach(g=>{line(svg,{x1:g.x-70,y1:704,x2:g.x+70,y2:704,stroke:g.stroke});text(svg,{text:g.text,x:g.x,y:g.y,fontSize:14,fill:g.stroke,anchor:'middle'})});p.plot.brackets.forEach(br=>{const x1=cats[br.from].x,x2=cats[br.to].x,yy=ymap(b,y,br.y);line(svg,{x1,y1:yy,x2,y2:yy});line(svg,{x1,y1:yy,x2:x1,y2:yy+7});line(svg,{x1:x2,y1:yy,x2,y2:yy+7});text(svg,{text:br.text,x:(x1+x2)/2,y:yy-7,fontSize:16,fontWeight:700,anchor:'middle'})})}
    function panelG(ctx,svg,p){const b=p.plot.dataBbox,x=p.plot.x,y=p.plot.y;axes(svg,b,x,y,{yLabelOffset:50});p.plot.series.forEach((s,i)=>{const f=t=>s.level+.07*Math.sin((t-20)/70)+.035*Math.sin(t/18+i)+.025*Math.sin(t/5+i*2);curve(svg,b,x,y,f,{stroke:s.stroke,w:1.8,dash:s.dash})});p.plot.legend.items.forEach((id,i)=>{const s=p.plot.series.find(q=>q.id===id);line(svg,{x1:p.plot.legend.x,y1:p.plot.legend.y+i*26,x2:p.plot.legend.x+28,y2:p.plot.legend.y+i*26,stroke:s.stroke,w:2,dash:s.dash});text(svg,{text:id,x:p.plot.legend.x+39,y:p.plot.legend.y+5+i*26,fontSize:14,fill:s.stroke})})}
    function panelH(ctx,svg,p,spec){const b=p.matrix.dataBbox,x=p.matrix.x,y=p.matrix.y;drawField(ctx,b,spec.colorScales.probabilityTealGold,p.matrix.marks[0].seed,'confusion');rect(svg,{...b,stroke:'#111',w:1});axes(svg,b,x,y,{yLabelOffset:55});colorbar(svg,p.matrix.colorbar,spec.colorScales.probabilityTealGold);const pb=p.profile.dataBbox,px=p.profile.x,py=p.profile.y;axes(svg,pb,px,py,{xLabelOffset:44});curve(svg,pb,px,py,t=>13+5*Math.sin(t/19)+3*Math.sin(t/7)+9*Math.exp(-((t-145)**2)/(2*18*18)),{stroke:'#006c6d',w:2})}
    fetch(SPEC_URL).then(r=>r.json()).then(render);
    $('generatedButton').onclick=()=>{$('frame').classList.remove('show-reference');$('generatedButton').classList.add('active');$('referenceButton').classList.remove('active')};
    $('referenceButton').onclick=()=>{$('frame').classList.add('show-reference');$('referenceButton').classList.add('active');$('generatedButton').classList.remove('active')};
  </script>
