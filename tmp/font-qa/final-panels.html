<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Final Panels</title>
  <style>
    html, body {
      margin: 0;
      background: #e6e6e6;
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 18px;
      padding: 18px;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      background: #ffffff;
      border: 1px solid #bbbbbb;
    }
  </style>
</head>
<body>
  <main>
    <img src="final-screenshots/reference-01-place-code-opto-A.png" alt="">
    <img src="final-screenshots/reference-01-place-code-opto-B.png" alt="">
    <img src="final-screenshots/reference-01-place-code-opto-C.png" alt="">
    <img src="final-screenshots/reference-01-place-code-opto-F.png" alt="">
    <img src="final-screenshots/reference-02-decision-dynamics-A.png" alt="">
    <img src="final-screenshots/reference-02-decision-dynamics-B.png" alt="">
  </main>
</body>
</html>
